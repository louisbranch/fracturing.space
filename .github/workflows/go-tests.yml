name: Go Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest
      - name: Run core verification lane
        run: make check-core

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
      - name: Run PR coverage lane
        if: github.event_name == 'pull_request'
        run: make check-coverage
      - name: Run main coverage lane
        if: github.event_name != 'pull_request'
        run: COVERAGE_CHECK_BASELINE=false make check-coverage
      - name: Upload coverage logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-logs
          path: |
            coverage.log
            coverage.raw
            coverage-critical-domain.func
            coverage-critical-domain.out
          if-no-files-found: warn
      - name: Upload coverage artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.out
            coverage-critical-domain.out

  coverage-badge:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
      - name: Configure git identity
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
      - name: Generate and push coverage badge
        run: |
          set -euo pipefail
          COVERAGE_PERCENT=$(go tool cover -func=coverage.out | awk '/total/ {print substr($3, 1, length($3)-1)}')
          if [ -z "$COVERAGE_PERCENT" ] || ! printf '%s\n' "$COVERAGE_PERCENT" | grep -Eq '^[0-9]+(\.[0-9]+)?$'; then
            echo "Failed to extract valid coverage percentage"
            exit 1
          fi
          CRITICAL_DOMAIN_COVERAGE_PERCENT=$(go tool cover -func=coverage-critical-domain.out | awk '/total/ {print substr($3, 1, length($3)-1)}')
          if [ -z "$CRITICAL_DOMAIN_COVERAGE_PERCENT" ] || ! printf '%s\n' "$CRITICAL_DOMAIN_COVERAGE_PERCENT" | grep -Eq '^[0-9]+(\.[0-9]+)?$'; then
            echo "Failed to extract valid critical-domain coverage percentage"
            exit 1
          fi
          COLOR=red
          if awk "BEGIN {exit !($COVERAGE_PERCENT >= 80)}"; then
            COLOR=brightgreen
          elif awk "BEGIN {exit !($COVERAGE_PERCENT >= 50)}"; then
            COLOR=yellow
          fi
          TMP_DIR=$(mktemp -d)
          mv coverage.out "$TMP_DIR/coverage.out"
          mv coverage-critical-domain.out "$TMP_DIR/coverage-critical-domain.out"
          if [ -f docs/reference/coverage-floors.json ]; then
            cp docs/reference/coverage-floors.json "$TMP_DIR/coverage-floors-seed.json"
          fi
          EXISTING_FLOORS_PATH=
          if git ls-remote --exit-code --heads origin badges; then
            git fetch origin badges
            if git show origin/badges:coverage-package-floors.json > "$TMP_DIR/coverage-package-floors-existing.json"; then
              EXISTING_FLOORS_PATH="$TMP_DIR/coverage-package-floors-existing.json"
            else
              rm -f "$TMP_DIR/coverage-package-floors-existing.json"
              echo "No existing coverage-package-floors.json on badges; ratcheting from seed floors."
            fi
          fi
          if [ -f "$TMP_DIR/coverage-floors-seed.json" ]; then
            if [ -n "$EXISTING_FLOORS_PATH" ]; then
              go run ./internal/tools/coveragefloors ratchet \
                -profile="$TMP_DIR/coverage.out" \
                -seed="$TMP_DIR/coverage-floors-seed.json" \
                -existing="$EXISTING_FLOORS_PATH" \
                -out="$TMP_DIR/coverage-package-floors.json"
            else
              go run ./internal/tools/coveragefloors ratchet \
                -profile="$TMP_DIR/coverage.out" \
                -seed="$TMP_DIR/coverage-floors-seed.json" \
                -out="$TMP_DIR/coverage-package-floors.json"
            fi
          fi
          go run github.com/nikolaydubina/go-cover-treemap -coverprofile="$TMP_DIR/coverage.out" -percent > "$TMP_DIR/coverage-treemap.svg"
          if git ls-remote --exit-code --heads origin badges; then
            git checkout -B badges origin/badges
          else
            git checkout --orphan badges
            git rm -rf .
            git clean -fdx
            git commit --allow-empty -m "chore: initialize badges branch"
          fi
          mv "$TMP_DIR/coverage.out" ./coverage.out
          mv "$TMP_DIR/coverage-critical-domain.out" ./coverage-critical-domain.out
          mv "$TMP_DIR/coverage-treemap.svg" ./coverage-treemap.svg
          if [ -f "$TMP_DIR/coverage-package-floors.json" ]; then
            mv "$TMP_DIR/coverage-package-floors.json" ./coverage-package-floors.json
          fi
          curl -f -o coverage.svg "https://img.shields.io/badge/coverage-${COVERAGE_PERCENT}%25-${COLOR}"
          echo "$COVERAGE_PERCENT" > coverage-baseline.txt
          echo "$CRITICAL_DOMAIN_COVERAGE_PERCENT" > coverage-critical-domain-baseline.txt
          git add -f coverage.svg coverage-treemap.svg coverage-baseline.txt coverage-critical-domain-baseline.txt coverage-package-floors.json
          if git diff --cached --quiet; then
            echo "No changes to coverage badge."
            exit 0
          fi
          git commit -m "chore: update coverage badge"
          for attempt in 1 2 3; do
            if git push --force-with-lease origin HEAD:refs/heads/badges; then
              echo "Successfully pushed coverage badge on attempt ${attempt}."
              exit 0
            fi
            echo "Push failed on attempt ${attempt}, retrying in 5 seconds..."
            sleep 5
          done
          echo "Failed to push coverage badge after 3 attempts."
          exit 1
