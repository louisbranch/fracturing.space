syntax = "proto3";

package game.v1;

import "common/v1/locale.proto";
import "game/v1/participant.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/louisbranch/fracturing.space/api/gen/go/game/v1;gamev1";

// InteractionService exposes the authoritative active-play interaction state for
// the game surface.
service InteractionService {
  // Returns the caller's current active-play interaction state for one
  // campaign.
  rpc GetInteractionState(GetInteractionStateRequest) returns (GetInteractionStateResponse);
  // Activates an existing scene for in-character play.
  rpc ActivateScene(ActivateSceneRequest) returns (ActivateSceneResponse);
  // Opens a new player phase on the active scene from a GM interaction.
  rpc OpenScenePlayerPhase(OpenScenePlayerPhaseRequest) returns (OpenScenePlayerPhaseResponse);
  // Updates one participant's current action summary in the open player phase.
  rpc SubmitScenePlayerAction(SubmitScenePlayerActionRequest) returns (SubmitScenePlayerActionResponse);
  // Marks the participant as yielded in the active scene's open player phase.
  rpc YieldScenePlayerPhase(YieldScenePlayerPhaseRequest) returns (YieldScenePlayerPhaseResponse);
  // Withdraws the participant's yielded state in the active scene's open player phase.
  rpc WithdrawScenePlayerYield(WithdrawScenePlayerYieldRequest) returns (WithdrawScenePlayerYieldResponse);
  // Interrupts the active scene's current player phase early under GM control.
  rpc InterruptScenePlayerPhase(InterruptScenePlayerPhaseRequest) returns (InterruptScenePlayerPhaseResponse);
  // Commits one authoritative GM interaction to the active scene without opening player control.
  rpc RecordSceneGMInteraction(RecordSceneGMInteractionRequest) returns (RecordSceneGMInteractionResponse);
  // Resolves a GM-review player phase by reframing the same phase, returning
  // control to the GM, or opening the next player phase.
  rpc ResolveScenePlayerReview(ResolveScenePlayerReviewRequest) returns (ResolveScenePlayerReviewResponse);
  // Opens a session-level OOC pause over the active scene.
  rpc OpenSessionOOC(OpenSessionOOCRequest) returns (OpenSessionOOCResponse);
  // Posts one append-only OOC message while the session is paused.
  rpc PostSessionOOC(PostSessionOOCRequest) returns (PostSessionOOCResponse);
  // Marks the caller as ready to resume from the current OOC pause.
  rpc MarkOOCReadyToResume(MarkOOCReadyToResumeRequest) returns (MarkOOCReadyToResumeResponse);
  // Clears the caller's ready-to-resume state for the current OOC pause.
  rpc ClearOOCReadyToResume(ClearOOCReadyToResumeRequest) returns (ClearOOCReadyToResumeResponse);
  // Resolves the current OOC pause back into in-character control.
  rpc ResolveSessionOOC(ResolveSessionOOCRequest) returns (ResolveSessionOOCResponse);
  // Sets which GM participant currently owns the next GM decision for the active session.
  rpc SetSessionGMAuthority(SetSessionGMAuthorityRequest) returns (SetSessionGMAuthorityResponse);
  // Re-queues the current failed AI GM turn when the session is still eligible.
  rpc RetryAIGMTurn(RetryAIGMTurnRequest) returns (RetryAIGMTurnResponse);
}

// CampaignAIOrchestrationService exposes internal-only automation lifecycle
// writes owned by the game service. Worker and AI services are the intended
// callers; browser clients must not use this surface.
service CampaignAIOrchestrationService {
  rpc QueueAIGMTurn(QueueAIGMTurnRequest) returns (QueueAIGMTurnResponse);
  rpc StartAIGMTurn(StartAIGMTurnRequest) returns (StartAIGMTurnResponse);
  rpc FailAIGMTurn(FailAIGMTurnRequest) returns (FailAIGMTurnResponse);
  rpc CompleteAIGMTurn(CompleteAIGMTurnRequest) returns (CompleteAIGMTurnResponse);
}

message InteractionViewer {
  string participant_id = 1;
  string name = 2;
  ParticipantRole role = 3;
}

message InteractionSession {
  string session_id = 1;
  string name = 2;
}

message InteractionCharacter {
  string character_id = 1;
  string name = 2;
  string owner_participant_id = 3;
}

enum GMInteractionBeatType {
  GM_INTERACTION_BEAT_TYPE_UNSPECIFIED = 0;
  GM_INTERACTION_BEAT_TYPE_FICTION = 1;
  GM_INTERACTION_BEAT_TYPE_PROMPT = 2;
  GM_INTERACTION_BEAT_TYPE_RESOLUTION = 3;
  GM_INTERACTION_BEAT_TYPE_CONSEQUENCE = 4;
  GM_INTERACTION_BEAT_TYPE_GUIDANCE = 5;
}

message GMInteractionIllustration {
  string image_url = 1;
  string alt = 2;
  string caption = 3;
}

message GMInteractionBeat {
  string beat_id = 1;
  GMInteractionBeatType type = 2;
  string text = 3;
}

message GMInteraction {
  string interaction_id = 1;
  string scene_id = 2;
  string phase_id = 3;
  string participant_id = 4;
  string title = 5;
  repeated string character_ids = 6;
  GMInteractionIllustration illustration = 7;
  repeated GMInteractionBeat beats = 8;
  google.protobuf.Timestamp created_at = 9;
}

message GMInteractionInputIllustration {
  string image_url = 1;
  string alt = 2;
  string caption = 3;
}

message GMInteractionInputBeat {
  string beat_id = 1;
  GMInteractionBeatType type = 2;
  string text = 3;
}

message GMInteractionInput {
  string title = 1;
  repeated string character_ids = 2;
  GMInteractionInputIllustration illustration = 3;
  repeated GMInteractionInputBeat beats = 4;
}

message InteractionScene {
  string scene_id = 1;
  string session_id = 2;
  string name = 3;
  string description = 4;
  repeated InteractionCharacter characters = 5;
  GMInteraction current_interaction = 6;
  repeated GMInteraction interaction_history = 7;
}

enum ScenePhaseStatus {
  SCENE_PHASE_STATUS_UNSPECIFIED = 0;
  SCENE_PHASE_STATUS_GM = 1;
  SCENE_PHASE_STATUS_PLAYERS = 2;
  SCENE_PHASE_STATUS_GM_REVIEW = 3;
}

enum ScenePlayerSlotReviewStatus {
  SCENE_PLAYER_SLOT_REVIEW_STATUS_UNSPECIFIED = 0;
  SCENE_PLAYER_SLOT_REVIEW_STATUS_OPEN = 1;
  SCENE_PLAYER_SLOT_REVIEW_STATUS_UNDER_REVIEW = 2;
  SCENE_PLAYER_SLOT_REVIEW_STATUS_ACCEPTED = 3;
  SCENE_PLAYER_SLOT_REVIEW_STATUS_CHANGES_REQUESTED = 4;
}

message ScenePlayerSlot {
  string participant_id = 1;
  string summary_text = 2;
  repeated string character_ids = 3;
  google.protobuf.Timestamp updated_at = 4;
  bool yielded = 5;
  ScenePlayerSlotReviewStatus review_status = 6;
  string review_reason = 7;
  repeated string review_character_ids = 8;
}

message ScenePlayerPhase {
  string phase_id = 1;
  ScenePhaseStatus status = 2;
  repeated string acting_character_ids = 4;
  repeated string acting_participant_ids = 5;
  repeated ScenePlayerSlot slots = 6;
}

message OOCPost {
  string post_id = 1;
  string participant_id = 2;
  string body = 3;
  google.protobuf.Timestamp created_at = 4;
}

message OOCState {
  bool open = 1;
  repeated OOCPost posts = 2;
  repeated string ready_to_resume_participant_ids = 3;
  string requested_by_participant_id = 4;
  string reason = 5;
  string interrupted_scene_id = 6;
  string interrupted_phase_id = 7;
  ScenePhaseStatus interrupted_phase_status = 8;
  bool resolution_pending = 9;
}

enum AITurnStatus {
  AI_TURN_STATUS_UNSPECIFIED = 0;
  AI_TURN_STATUS_IDLE = 1;
  AI_TURN_STATUS_QUEUED = 2;
  AI_TURN_STATUS_RUNNING = 3;
  AI_TURN_STATUS_FAILED = 4;
}

message AITurnState {
  AITurnStatus status = 1;
  string turn_token = 2;
  string owner_participant_id = 3;
  string source_event_type = 4;
  string source_scene_id = 5;
  string source_phase_id = 6;
  string last_error = 7;
}

enum InteractionControlMode {
  INTERACTION_CONTROL_MODE_UNSPECIFIED = 0;
  INTERACTION_CONTROL_MODE_GM = 1;
  INTERACTION_CONTROL_MODE_PLAYERS = 2;
  INTERACTION_CONTROL_MODE_GM_REVIEW = 3;
  INTERACTION_CONTROL_MODE_OOC = 4;
  INTERACTION_CONTROL_MODE_OOC_RESOLUTION = 5;
}

enum InteractionTransition {
  INTERACTION_TRANSITION_UNSPECIFIED = 0;
  INTERACTION_TRANSITION_ACTIVATE_SCENE = 1;
  INTERACTION_TRANSITION_OPEN_SCENE_PLAYER_PHASE = 2;
  INTERACTION_TRANSITION_RECORD_SCENE_GM_INTERACTION = 3;
  INTERACTION_TRANSITION_SUBMIT_SCENE_PLAYER_ACTION = 4;
  INTERACTION_TRANSITION_YIELD_SCENE_PLAYER_PHASE = 5;
  INTERACTION_TRANSITION_WITHDRAW_SCENE_PLAYER_YIELD = 6;
  INTERACTION_TRANSITION_INTERRUPT_SCENE_PLAYER_PHASE = 7;
  INTERACTION_TRANSITION_RESOLVE_SCENE_PLAYER_REVIEW = 8;
  INTERACTION_TRANSITION_OPEN_SESSION_OOC = 9;
  INTERACTION_TRANSITION_POST_SESSION_OOC = 10;
  INTERACTION_TRANSITION_MARK_OOC_READY_TO_RESUME = 11;
  INTERACTION_TRANSITION_CLEAR_OOC_READY_TO_RESUME = 12;
  INTERACTION_TRANSITION_RESOLVE_SESSION_OOC = 13;
  INTERACTION_TRANSITION_SET_SESSION_GM_AUTHORITY = 14;
  INTERACTION_TRANSITION_RETRY_AI_GM_TURN = 15;
}

message InteractionControlState {
  InteractionControlMode mode = 1;
  repeated InteractionTransition allowed_transitions = 2;
  InteractionTransition recommended_transition = 3;
  string recommended_scene_id = 4;
  string recommended_phase_id = 5;
}

message InteractionState {
  string campaign_id = 1;
  string campaign_name = 2;
  common.v1.Locale locale = 3;
  InteractionViewer viewer = 4;
  InteractionSession active_session = 5;
  InteractionScene active_scene = 6;
  ScenePlayerPhase player_phase = 7;
  OOCState ooc = 8;
  string gm_authority_participant_id = 9;
  AITurnState ai_turn = 10;
  InteractionControlState control = 11;
}

message GetInteractionStateRequest {
  string campaign_id = 1;
}

message GetInteractionStateResponse {
  InteractionState state = 1;
}

message ActivateSceneRequest {
  string campaign_id = 1;
  string scene_id = 2;
}

message ActivateSceneResponse {
  InteractionState state = 1;
}

message OpenScenePlayerPhaseRequest {
  string campaign_id = 1;
  string scene_id = 2;
  GMInteractionInput interaction = 3;
  repeated string character_ids = 4;
}

message OpenScenePlayerPhaseResponse {
  InteractionState state = 1;
}

message SubmitScenePlayerActionRequest {
  string campaign_id = 1;
  string scene_id = 2;
  string summary_text = 3;
  repeated string character_ids = 4;
}

message SubmitScenePlayerActionResponse {
  InteractionState state = 1;
}

message YieldScenePlayerPhaseRequest {
  string campaign_id = 1;
  string scene_id = 2;
}

message YieldScenePlayerPhaseResponse {
  InteractionState state = 1;
}

message WithdrawScenePlayerYieldRequest {
  string campaign_id = 1;
  string scene_id = 2;
}

message WithdrawScenePlayerYieldResponse {
  InteractionState state = 1;
}

message InterruptScenePlayerPhaseRequest {
  string campaign_id = 1;
  string scene_id = 2;
  string reason = 3;
}

message InterruptScenePlayerPhaseResponse {
  InteractionState state = 1;
}

message RecordSceneGMInteractionRequest {
  string campaign_id = 1;
  string scene_id = 2;
  GMInteractionInput interaction = 3;
}

message RecordSceneGMInteractionResponse {
  InteractionState state = 1;
}

message ScenePlayerRevisionRequest {
  string participant_id = 1;
  string reason = 2;
  repeated string character_ids = 3;
}

message ResolveScenePlayerReviewOpenNextPlayerPhase {
  GMInteractionInput interaction = 1;
  repeated string next_character_ids = 2;
}

message ResolveScenePlayerReviewRequestRevisions {
  GMInteractionInput interaction = 1;
  repeated ScenePlayerRevisionRequest revisions = 2;
}

message ResolveScenePlayerReviewReturnToGM {
  GMInteractionInput interaction = 1;
}

message ResolveScenePlayerReviewRequest {
  string campaign_id = 1;
  string scene_id = 2;
  oneof resolution {
    ResolveScenePlayerReviewOpenNextPlayerPhase open_next_player_phase = 3;
    ResolveScenePlayerReviewRequestRevisions request_revisions = 4;
    ResolveScenePlayerReviewReturnToGM return_to_gm = 5;
  }
}

message ResolveScenePlayerReviewResponse {
  InteractionState state = 1;
}

message OpenSessionOOCRequest {
  string campaign_id = 1;
  string reason = 2;
}

message OpenSessionOOCResponse {
  InteractionState state = 1;
}

message PostSessionOOCRequest {
  string campaign_id = 1;
  string body = 2;
}

message PostSessionOOCResponse {
  InteractionState state = 1;
}

message MarkOOCReadyToResumeRequest {
  string campaign_id = 1;
}

message MarkOOCReadyToResumeResponse {
  InteractionState state = 1;
}

message ClearOOCReadyToResumeRequest {
  string campaign_id = 1;
}

message ClearOOCReadyToResumeResponse {
  InteractionState state = 1;
}

message ResolveSessionOOCResumeInterruptedPhase {}

message ResolveSessionOOCReturnToGM {
  string scene_id = 1;
}

message ResolveSessionOOCOpenPlayerPhase {
  string scene_id = 1;
  GMInteractionInput interaction = 2;
  repeated string next_character_ids = 3;
}

message ResolveSessionOOCRequest {
  string campaign_id = 1;
  oneof resolution {
    ResolveSessionOOCResumeInterruptedPhase resume_interrupted_phase = 2;
    ResolveSessionOOCReturnToGM return_to_gm = 3;
    ResolveSessionOOCOpenPlayerPhase open_player_phase = 4;
  }
}

message ResolveSessionOOCResponse {
  InteractionState state = 1;
}

message SetSessionGMAuthorityRequest {
  string campaign_id = 1;
  string participant_id = 2;
}

message SetSessionGMAuthorityResponse {
  InteractionState state = 1;
}

message RetryAIGMTurnRequest {
  string campaign_id = 1;
}

message RetryAIGMTurnResponse {
  InteractionState state = 1;
}

message QueueAIGMTurnRequest {
  string campaign_id = 1;
  string session_id = 2;
  string source_event_type = 3;
  string source_scene_id = 4;
  string source_phase_id = 5;
}

message QueueAIGMTurnResponse {
  AITurnState ai_turn = 1;
}

message StartAIGMTurnRequest {
  string campaign_id = 1;
  string session_id = 2;
  string turn_token = 3;
}

message StartAIGMTurnResponse {
  AITurnState ai_turn = 1;
}

message FailAIGMTurnRequest {
  string campaign_id = 1;
  string session_id = 2;
  string turn_token = 3;
  string last_error = 4;
}

message FailAIGMTurnResponse {
  AITurnState ai_turn = 1;
}

message CompleteAIGMTurnRequest {
  string campaign_id = 1;
  string session_id = 2;
  string turn_token = 3;
}

message CompleteAIGMTurnResponse {
  AITurnState ai_turn = 1;
}
