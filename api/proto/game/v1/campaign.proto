syntax = "proto3";

package game.v1;

import "common/v1/locale.proto";
import "google/protobuf/timestamp.proto";
import "common/v1/game_system.proto";
import "game/v1/participant.proto";

option go_package = "github.com/louisbranch/fracturing.space/api/gen/go/game/v1;gamev1";

// Campaign represents a game campaign's configuration.
// This is the "config layer" - settings that rarely change after setup.
message Campaign {
  string id = 1;
  string name = 2;
  common.v1.Locale locale = 3;
  // The game system this campaign uses. Required at creation, immutable.
  common.v1.GameSystem system = 4;
  CampaignStatus status = 5;
  // Whether the campaign can start a session now.
  bool can_start_session = 6;
  GmMode gm_mode = 7;
  CampaignIntent intent = 8;
  CampaignAccessPolicy access_policy = 9;
  // Number of all participants (GM + PLAYER + future roles) for this campaign.
  int32 participant_count = 10;
  // Number of all characters (PC + NPC + future kinds) for this campaign.
  int32 character_count = 11;
  string theme_prompt = 12;
  // Selected built-in cover set identifier.
  string cover_set_id = 13;
  // Selected built-in cover asset identifier.
  string cover_asset_id = 14;
  google.protobuf.Timestamp created_at = 15;
  google.protobuf.Timestamp updated_at = 16;
  // Timestamp when the campaign was completed.
  google.protobuf.Timestamp completed_at = 17;
  // Timestamp when the campaign was archived.
  google.protobuf.Timestamp archived_at = 18;
  // Opaque AI agent identifier bound for AI/HYBRID GM modes.
  string ai_agent_id = 19;
}

enum CampaignStatus {
  CAMPAIGN_STATUS_UNSPECIFIED = 0;
  DRAFT = 1;
  ACTIVE = 2;
  COMPLETED = 3;
  ARCHIVED = 4;
}

enum GmMode {
  GM_MODE_UNSPECIFIED = 0;
  HUMAN = 1;
  AI = 2;
  HYBRID = 3;
}

enum CampaignIntent {
  CAMPAIGN_INTENT_UNSPECIFIED = 0;
  STANDARD = 1;
  STARTER = 2;
  SANDBOX = 3;
}

enum CampaignAccessPolicy {
  CAMPAIGN_ACCESS_POLICY_UNSPECIFIED = 0;
  PRIVATE = 1;
  RESTRICTED = 2;
  PUBLIC = 3;
}

// CampaignService provides CRUD operations for campaigns.
service CampaignService {
  // Create a new campaign metadata record.
  rpc CreateCampaign(CreateCampaignRequest) returns (CreateCampaignResponse);

  // List campaign metadata records.
  rpc ListCampaigns(ListCampaignsRequest) returns (ListCampaignsResponse);

  // Get a campaign metadata record by ID.
  rpc GetCampaign(GetCampaignRequest) returns (GetCampaignResponse);

  // End a campaign.
  rpc EndCampaign(EndCampaignRequest) returns (EndCampaignResponse);

  // Archive a campaign.
  rpc ArchiveCampaign(ArchiveCampaignRequest) returns (ArchiveCampaignResponse);

  // Restore a campaign.
  rpc RestoreCampaign(RestoreCampaignRequest) returns (RestoreCampaignResponse);

  // Set the selected built-in cover asset for a campaign.
  rpc SetCampaignCover(SetCampaignCoverRequest) returns (SetCampaignCoverResponse);

  // Bind an AI agent to a campaign (owner-only).
  rpc SetCampaignAIBinding(SetCampaignAIBindingRequest) returns (SetCampaignAIBindingResponse);

  // Clear the AI agent binding from a campaign (owner-only).
  rpc ClearCampaignAIBinding(ClearCampaignAIBindingRequest) returns (ClearCampaignAIBindingResponse);
}

// CampaignAIService provides internal-only Game<=>AI/Game<=>Chat campaign AI contracts.
service CampaignAIService {
  // Issues a session-scoped grant for AI turn relay.
  rpc IssueCampaignAISessionGrant(IssueCampaignAISessionGrantRequest) returns (IssueCampaignAISessionGrantResponse);

  // Internal read for AI-service usage guards.
  rpc GetCampaignAIBindingUsage(GetCampaignAIBindingUsageRequest) returns (GetCampaignAIBindingUsageResponse);

  // Returns current campaign AI auth state for local AI validation caches.
  rpc GetCampaignAIAuthState(GetCampaignAIAuthStateRequest) returns (GetCampaignAIAuthStateResponse);
}

message CreateCampaignRequest {
  // Display name for the campaign.
  string name = 1;

  // The game system for this campaign. Required.
  common.v1.GameSystem system = 2;

  // The mode of GM participation.
  GmMode gm_mode = 3;

  // Intent for the campaign (e.g. standard, starter, sandbox).
  CampaignIntent intent = 4;

  // Visibility/access policy for the campaign.
  CampaignAccessPolicy access_policy = 5;

  // Optional free-form theme prompt for assistants.
  string theme_prompt = 6;

  // Preferred locale for the campaign.
  common.v1.Locale locale = 7;
}

message CreateCampaignResponse {
  Campaign campaign = 1;
  Participant owner_participant = 2;
  repeated string warnings = 3;
}

message ListCampaignsRequest {
  // The maximum number of campaigns to return.
  // If zero, the server defaults to 10. The server clamps values above 10 to 10.
  int32 page_size = 1;

  // A page token received from a prior ListCampaignsResponse.
  string page_token = 2;
}

message ListCampaignsResponse {
  repeated Campaign campaigns = 1;
  string next_page_token = 2;
}

message GetCampaignRequest {
  // The campaign ID to retrieve.
  string campaign_id = 1;
}

message GetCampaignResponse {
  Campaign campaign = 1;
}

message EndCampaignRequest {
  // The campaign ID to end.
  string campaign_id = 1;
}

message EndCampaignResponse {
  Campaign campaign = 1;
}

message ArchiveCampaignRequest {
  // The campaign ID to archive.
  string campaign_id = 1;
}

message ArchiveCampaignResponse {
  Campaign campaign = 1;
}

message RestoreCampaignRequest {
  // The campaign ID to restore.
  string campaign_id = 1;
}

message RestoreCampaignResponse {
  Campaign campaign = 1;
}

message SetCampaignCoverRequest {
  // The campaign ID to update.
  string campaign_id = 1;

  // Built-in campaign cover asset identifier.
  string cover_asset_id = 2;

  // Optional built-in campaign cover set identifier.
  string cover_set_id = 3;
}

message SetCampaignCoverResponse {
  Campaign campaign = 1;
}

message SetCampaignAIBindingRequest {
  // The campaign ID to update.
  string campaign_id = 1;

  // The AI service opaque agent identifier to bind.
  string ai_agent_id = 2;
}

message SetCampaignAIBindingResponse {
  Campaign campaign = 1;
}

message ClearCampaignAIBindingRequest {
  // The campaign ID to update.
  string campaign_id = 1;
}

message ClearCampaignAIBindingResponse {
  Campaign campaign = 1;
}

message IssueCampaignAISessionGrantRequest {
  // The campaign ID to issue the grant for.
  string campaign_id = 1;

  // Expected active session ID.
  string session_id = 2;

  // Expected bound AI agent ID.
  string ai_agent_id = 3;
}

message IssueCampaignAISessionGrantResponse {
  AISessionGrant grant = 1;
}

message AISessionGrant {
  // Opaque signed token consumed by AI invocation endpoints.
  string token = 1;

  string grant_id = 2;
  string campaign_id = 3;
  string session_id = 4;
  string ai_agent_id = 5;
  uint64 auth_epoch = 6;
  google.protobuf.Timestamp issued_at = 7;
  google.protobuf.Timestamp expires_at = 8;
  // User ID context at issuance time when available.
  string issued_for_user_id = 9;
}

message GetCampaignAIBindingUsageRequest {
  // The AI service opaque agent identifier.
  string ai_agent_id = 1;
}

message GetCampaignAIBindingUsageResponse {
  // Number of campaigns in DRAFT/ACTIVE bound to this agent.
  int32 active_campaign_count = 1;
  // Campaign IDs in DRAFT/ACTIVE bound to this agent.
  repeated string campaign_ids = 2;
}

message GetCampaignAIAuthStateRequest {
  // The campaign ID to read auth state for.
  string campaign_id = 1;
}

message GetCampaignAIAuthStateResponse {
  string campaign_id = 1;
  string ai_agent_id = 2;
  string active_session_id = 3;
  uint64 auth_epoch = 4;
}
