syntax = "proto3";

package ai.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/louisbranch/fracturing.space/api/gen/go/ai/v1;aiv1";

enum Provider {
  PROVIDER_UNSPECIFIED = 0;
  PROVIDER_OPENAI = 1;
  PROVIDER_ANTHROPIC = 2;
}

enum CredentialStatus {
  CREDENTIAL_STATUS_UNSPECIFIED = 0;
  CREDENTIAL_STATUS_ACTIVE = 1;
  CREDENTIAL_STATUS_REVOKED = 2;
}

enum AgentStatus {
  AGENT_STATUS_UNSPECIFIED = 0;
  AGENT_STATUS_ACTIVE = 1;
}

enum AgentAuthState {
  AGENT_AUTH_STATE_UNSPECIFIED = 0;
  AGENT_AUTH_STATE_READY = 1;
  AGENT_AUTH_STATE_AUTH_REFERENCE_REVOKED = 2;
  AGENT_AUTH_STATE_AUTH_REFERENCE_UNAVAILABLE = 3;
}

enum AgentAuthReferenceType {
  AGENT_AUTH_REFERENCE_TYPE_UNSPECIFIED = 0;
  AGENT_AUTH_REFERENCE_TYPE_CREDENTIAL = 1;
  AGENT_AUTH_REFERENCE_TYPE_PROVIDER_GRANT = 2;
}

enum ProviderGrantStatus {
  PROVIDER_GRANT_STATUS_UNSPECIFIED = 0;
  PROVIDER_GRANT_STATUS_ACTIVE = 1;
  PROVIDER_GRANT_STATUS_REVOKED = 2;
  PROVIDER_GRANT_STATUS_EXPIRED = 3;
  PROVIDER_GRANT_STATUS_REFRESH_FAILED = 4;
}

enum AccessRequestStatus {
  ACCESS_REQUEST_STATUS_UNSPECIFIED = 0;
  ACCESS_REQUEST_STATUS_PENDING = 1;
  ACCESS_REQUEST_STATUS_APPROVED = 2;
  ACCESS_REQUEST_STATUS_DENIED = 3;
  ACCESS_REQUEST_STATUS_REVOKED = 4;
}

enum AccessRequestRole {
  ACCESS_REQUEST_ROLE_UNSPECIFIED = 0;
  ACCESS_REQUEST_ROLE_REQUESTER = 1;
  ACCESS_REQUEST_ROLE_OWNER = 2;
}

enum AccessRequestDecision {
  ACCESS_REQUEST_DECISION_UNSPECIFIED = 0;
  ACCESS_REQUEST_DECISION_APPROVE = 1;
  ACCESS_REQUEST_DECISION_DENY = 2;
}

message Credential {
  string id = 1;
  string owner_user_id = 2;
  Provider provider = 3;
  string label = 4;
  CredentialStatus status = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  google.protobuf.Timestamp revoked_at = 8;
}

message AgentAuthReference {
  AgentAuthReferenceType type = 1;
  string id = 2;
}

message Agent {
  string id = 1;
  string owner_user_id = 2;
  string label = 3;
  Provider provider = 4;
  string model = 5;
  AgentAuthReference auth_reference = 6;
  AgentStatus status = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  AgentAuthState auth_state = 10;
  string instructions = 11;
  int32 active_campaign_count = 12;
}

message ProviderGrant {
  string id = 1;
  string owner_user_id = 2;
  Provider provider = 3;
  repeated string granted_scopes = 4;
  bool refresh_supported = 5;
  ProviderGrantStatus status = 6;
  string last_refresh_error = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  google.protobuf.Timestamp revoked_at = 10;
  google.protobuf.Timestamp expires_at = 11;
  google.protobuf.Timestamp last_refreshed_at = 12;
}

message AccessRequest {
  string id = 1;
  string requester_user_id = 2;
  string owner_user_id = 3;
  string agent_id = 4;
  string scope = 5;
  string request_note = 6;
  AccessRequestStatus status = 7;
  string reviewer_user_id = 8;
  string review_note = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  google.protobuf.Timestamp reviewed_at = 12;
  string revoker_user_id = 13;
  string revoke_note = 14;
  google.protobuf.Timestamp revoked_at = 15;
}

message AuditEvent {
  string id = 1;
  string event_name = 2;
  string actor_user_id = 3;
  string owner_user_id = 4;
  string requester_user_id = 5;
  string agent_id = 6;
  string access_request_id = 7;
  string outcome = 8;
  google.protobuf.Timestamp created_at = 9;
}

service CredentialService {
  rpc CreateCredential(CreateCredentialRequest) returns (CreateCredentialResponse);
  rpc ListCredentials(ListCredentialsRequest) returns (ListCredentialsResponse);
  rpc RevokeCredential(RevokeCredentialRequest) returns (RevokeCredentialResponse);
}

message CreateCredentialRequest {
  Provider provider = 1;
  string label = 2;
  string secret = 3;
}

message CreateCredentialResponse {
  Credential credential = 1;
}

message ListCredentialsRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListCredentialsResponse {
  repeated Credential credentials = 1;
  string next_page_token = 2;
}

message RevokeCredentialRequest {
  string credential_id = 1;
}

message RevokeCredentialResponse {
  Credential credential = 1;
}

service AgentService {
  rpc CreateAgent(CreateAgentRequest) returns (CreateAgentResponse);
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
  rpc ListProviderModels(ListProviderModelsRequest) returns (ListProviderModelsResponse);
  rpc ListAccessibleAgents(ListAccessibleAgentsRequest) returns (ListAccessibleAgentsResponse);
  rpc GetAccessibleAgent(GetAccessibleAgentRequest) returns (GetAccessibleAgentResponse);
  rpc ValidateCampaignAgentBinding(ValidateCampaignAgentBindingRequest) returns (ValidateCampaignAgentBindingResponse);
  rpc UpdateAgent(UpdateAgentRequest) returns (UpdateAgentResponse);
  rpc DeleteAgent(DeleteAgentRequest) returns (DeleteAgentResponse);
}

service InvocationService {
  rpc InvokeAgent(InvokeAgentRequest) returns (InvokeAgentResponse);
}

service CampaignOrchestrationService {
  rpc RunCampaignTurn(RunCampaignTurnRequest) returns (RunCampaignTurnResponse);
}

service CampaignDebugService {
  rpc ListCampaignDebugTurns(ListCampaignDebugTurnsRequest) returns (ListCampaignDebugTurnsResponse);
  rpc GetCampaignDebugTurn(GetCampaignDebugTurnRequest) returns (GetCampaignDebugTurnResponse);
  rpc SubscribeCampaignDebugUpdates(SubscribeCampaignDebugUpdatesRequest) returns (stream CampaignDebugTurnUpdate);
}

service CampaignArtifactService {
  rpc EnsureCampaignArtifacts(EnsureCampaignArtifactsRequest) returns (EnsureCampaignArtifactsResponse);
  rpc ListCampaignArtifacts(ListCampaignArtifactsRequest) returns (ListCampaignArtifactsResponse);
  rpc GetCampaignArtifact(GetCampaignArtifactRequest) returns (GetCampaignArtifactResponse);
  rpc UpsertCampaignArtifact(UpsertCampaignArtifactRequest) returns (UpsertCampaignArtifactResponse);
}

service SystemReferenceService {
  rpc SearchSystemReference(SearchSystemReferenceRequest) returns (SearchSystemReferenceResponse);
  rpc ReadSystemReferenceDocument(ReadSystemReferenceDocumentRequest) returns (ReadSystemReferenceDocumentResponse);
}

service ProviderGrantService {
  rpc StartProviderConnect(StartProviderConnectRequest) returns (StartProviderConnectResponse);
  rpc FinishProviderConnect(FinishProviderConnectRequest) returns (FinishProviderConnectResponse);
  rpc ListProviderGrants(ListProviderGrantsRequest) returns (ListProviderGrantsResponse);
  rpc RevokeProviderGrant(RevokeProviderGrantRequest) returns (RevokeProviderGrantResponse);
}

service AccessRequestService {
  rpc CreateAccessRequest(CreateAccessRequestRequest) returns (CreateAccessRequestResponse);
  rpc ListAccessRequests(ListAccessRequestsRequest) returns (ListAccessRequestsResponse);
  rpc ListAuditEvents(ListAuditEventsRequest) returns (ListAuditEventsResponse);
  rpc ReviewAccessRequest(ReviewAccessRequestRequest) returns (ReviewAccessRequestResponse);
  rpc RevokeAccessRequest(RevokeAccessRequestRequest) returns (RevokeAccessRequestResponse);
}

message CreateAgentRequest {
  string label = 1;
  Provider provider = 2;
  string model = 3;
  AgentAuthReference auth_reference = 4;
  string instructions = 5;
}

message CreateAgentResponse {
  Agent agent = 1;
}

message ListAgentsRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListAgentsResponse {
  repeated Agent agents = 1;
  string next_page_token = 2;
}

message ListProviderModelsRequest {
  Provider provider = 1;
  AgentAuthReference auth_reference = 2;
}

message ProviderModel {
  string id = 1;
}

message ListProviderModelsResponse {
  repeated ProviderModel models = 1;
}

message ListAccessibleAgentsRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListAccessibleAgentsResponse {
  repeated Agent agents = 1;
  string next_page_token = 2;
}

message GetAccessibleAgentRequest {
  string agent_id = 1;
}

message GetAccessibleAgentResponse {
  Agent agent = 1;
}

message ValidateCampaignAgentBindingRequest {
  string agent_id = 1;
  string campaign_id = 2;
}

message ValidateCampaignAgentBindingResponse {
  Agent agent = 1;
}

message UpdateAgentRequest {
  string agent_id = 1;
  string label = 2;
  string model = 3;
  AgentAuthReference auth_reference = 4;
  string instructions = 5;
}

message UpdateAgentResponse {
  Agent agent = 1;
}

message DeleteAgentRequest {
  string agent_id = 1;
}

message DeleteAgentResponse {}

message Usage {
  int32 input_tokens = 1;
  int32 output_tokens = 2;
  int32 reasoning_tokens = 3;
  int32 total_tokens = 4;
}

message InvokeAgentRequest {
  string agent_id = 1;
  string input = 2;
  string reasoning_effort = 3;
}

message InvokeAgentResponse {
  string output_text = 1;
  Provider provider = 2;
  string model = 3;
  Usage usage = 4;
}

message RunCampaignTurnRequest {
  string session_grant = 1;
  string input = 2;
  string reasoning_effort = 3;
  string turn_token = 4;
}

message RunCampaignTurnResponse {
  string output_text = 1;
  Provider provider = 2;
  string model = 3;
  Usage usage = 4;
}

enum CampaignDebugTurnStatus {
  CAMPAIGN_DEBUG_TURN_STATUS_UNSPECIFIED = 0;
  CAMPAIGN_DEBUG_TURN_STATUS_RUNNING = 1;
  CAMPAIGN_DEBUG_TURN_STATUS_SUCCEEDED = 2;
  CAMPAIGN_DEBUG_TURN_STATUS_FAILED = 3;
}

enum CampaignDebugEntryKind {
  CAMPAIGN_DEBUG_ENTRY_KIND_UNSPECIFIED = 0;
  CAMPAIGN_DEBUG_ENTRY_KIND_MODEL_RESPONSE = 1;
  CAMPAIGN_DEBUG_ENTRY_KIND_TOOL_CALL = 2;
  CAMPAIGN_DEBUG_ENTRY_KIND_TOOL_RESULT = 3;
}

message CampaignDebugEntry {
  int32 sequence = 1;
  CampaignDebugEntryKind kind = 2;
  string tool_name = 3;
  string payload = 4;
  bool payload_truncated = 5;
  string call_id = 6;
  string response_id = 7;
  bool is_error = 8;
  google.protobuf.Timestamp created_at = 9;
  Usage usage = 10;
}

message CampaignDebugTurn {
  string id = 1;
  string campaign_id = 2;
  string session_id = 3;
  string turn_token = 4;
  string participant_id = 5;
  Provider provider = 6;
  string model = 7;
  CampaignDebugTurnStatus status = 8;
  string last_error = 9;
  Usage usage = 10;
  google.protobuf.Timestamp started_at = 11;
  google.protobuf.Timestamp updated_at = 12;
  google.protobuf.Timestamp completed_at = 13;
  repeated CampaignDebugEntry entries = 14;
}

message CampaignDebugTurnSummary {
  string id = 1;
  string campaign_id = 2;
  string session_id = 3;
  string turn_token = 4;
  string participant_id = 5;
  Provider provider = 6;
  string model = 7;
  CampaignDebugTurnStatus status = 8;
  string last_error = 9;
  Usage usage = 10;
  google.protobuf.Timestamp started_at = 11;
  google.protobuf.Timestamp updated_at = 12;
  google.protobuf.Timestamp completed_at = 13;
  int32 entry_count = 14;
}

message ListCampaignDebugTurnsRequest {
  string campaign_id = 1;
  string session_id = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message ListCampaignDebugTurnsResponse {
  repeated CampaignDebugTurnSummary turns = 1;
  string next_page_token = 2;
}

message GetCampaignDebugTurnRequest {
  string campaign_id = 1;
  string turn_id = 2;
}

message GetCampaignDebugTurnResponse {
  CampaignDebugTurn turn = 1;
}

message SubscribeCampaignDebugUpdatesRequest {
  string campaign_id = 1;
  string session_id = 2;
}

message CampaignDebugTurnUpdate {
  CampaignDebugTurnSummary turn = 1;
  repeated CampaignDebugEntry appended_entries = 2;
}

message CampaignArtifact {
  string campaign_id = 1;
  string path = 2;
  string content = 3;
  bool read_only = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message EnsureCampaignArtifactsRequest {
  string campaign_id = 1;
  string story_seed_markdown = 2;
}

message EnsureCampaignArtifactsResponse {
  repeated CampaignArtifact artifacts = 1;
}

message ListCampaignArtifactsRequest {
  string campaign_id = 1;
}

message ListCampaignArtifactsResponse {
  repeated CampaignArtifact artifacts = 1;
}

message GetCampaignArtifactRequest {
  string campaign_id = 1;
  string path = 2;
}

message GetCampaignArtifactResponse {
  CampaignArtifact artifact = 1;
}

message UpsertCampaignArtifactRequest {
  string campaign_id = 1;
  string path = 2;
  string content = 3;
}

message UpsertCampaignArtifactResponse {
  CampaignArtifact artifact = 1;
}

message SystemReferenceDocument {
  string system = 1;
  string document_id = 2;
  string title = 3;
  string kind = 4;
  string path = 5;
  repeated string aliases = 6;
  string content = 7;
}

message SystemReferenceDocumentSummary {
  string system = 1;
  string document_id = 2;
  string title = 3;
  string kind = 4;
  string path = 5;
  repeated string aliases = 6;
  string snippet = 7;
}

message SearchSystemReferenceRequest {
  string system = 1;
  string query = 2;
  int32 max_results = 3;
}

message SearchSystemReferenceResponse {
  repeated SystemReferenceDocumentSummary results = 1;
}

message ReadSystemReferenceDocumentRequest {
  string system = 1;
  string document_id = 2;
}

message ReadSystemReferenceDocumentResponse {
  SystemReferenceDocument document = 1;
}

message StartProviderConnectRequest {
  Provider provider = 1;
  repeated string requested_scopes = 2;
}

message StartProviderConnectResponse {
  string connect_session_id = 1;
  string state = 2;
  string authorization_url = 3;
  google.protobuf.Timestamp expires_at = 4;
}

message FinishProviderConnectRequest {
  string connect_session_id = 1;
  string state = 2;
  string authorization_code = 3;
}

message FinishProviderConnectResponse {
  ProviderGrant provider_grant = 1;
}

message ListProviderGrantsRequest {
  int32 page_size = 1;
  string page_token = 2;
  Provider provider = 3;
  ProviderGrantStatus status = 4;
}

message ListProviderGrantsResponse {
  repeated ProviderGrant provider_grants = 1;
  string next_page_token = 2;
}

message RevokeProviderGrantRequest {
  string provider_grant_id = 1;
}

message RevokeProviderGrantResponse {
  ProviderGrant provider_grant = 1;
}

message CreateAccessRequestRequest {
  string agent_id = 1;
  string scope = 2;
  string request_note = 3;
}

message CreateAccessRequestResponse {
  AccessRequest access_request = 1;
}

message ListAccessRequestsRequest {
  AccessRequestRole role = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListAccessRequestsResponse {
  repeated AccessRequest access_requests = 1;
  string next_page_token = 2;
}

message ListAuditEventsRequest {
  int32 page_size = 1;
  string page_token = 2;
  string event_name = 3;
  string agent_id = 4;
  google.protobuf.Timestamp created_after = 5;
  google.protobuf.Timestamp created_before = 6;
}

message ListAuditEventsResponse {
  repeated AuditEvent audit_events = 1;
  string next_page_token = 2;
}

message ReviewAccessRequestRequest {
  string access_request_id = 1;
  AccessRequestDecision decision = 2;
  string review_note = 3;
}

message ReviewAccessRequestResponse {
  AccessRequest access_request = 1;
}

message RevokeAccessRequestRequest {
  string access_request_id = 1;
  string revoke_note = 2;
}

message RevokeAccessRequestResponse {
  AccessRequest access_request = 1;
}
