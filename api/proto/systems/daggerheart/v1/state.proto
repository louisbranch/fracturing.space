syntax = "proto3";

package systems.daggerheart.v1;

import "common/v1/rng.proto";
import "google/protobuf/wrappers.proto";

option go_package = "github.com/louisbranch/fracturing.space/api/gen/go/systems/daggerheart/v1;daggerheartv1";

// DaggerheartExperience captures a named experience and modifier.
message DaggerheartExperience {
  string name = 1;
  int32 modifier = 2;
}

// DaggerheartHeritageSelection captures the resolved ancestry/community choice
// used for Daggerheart creation and read surfaces.
message DaggerheartHeritageSelection {
  string ancestry_label = 1;
  string first_feature_ancestry_id = 2;
  string first_feature_id = 3;
  string second_feature_ancestry_id = 4;
  string second_feature_id = 5;
  string community_id = 6;
  // Display-ready ancestry summary resolved for sheet/card read surfaces.
  string ancestry_name = 7;
  // Display-ready community name resolved for sheet/card read surfaces.
  string community_name = 8;
}

// DaggerheartCompanionSheet stores the static companion sheet selected during
// Daggerheart character creation.
message DaggerheartCompanionExperience {
  string experience_id = 1;
  string name = 2;
  int32 modifier = 3;
}

message DaggerheartCompanionSheet {
  string animal_kind = 1;
  string name = 2;
  int32 evasion = 3;
  repeated DaggerheartCompanionExperience experiences = 4;
  string attack_description = 5;
  string attack_range = 6;
  int32 damage_die_sides = 7;
  string damage_type = 8;
}

message DaggerheartCompanionState {
  string status = 1;
  string active_experience_id = 2;
}

enum DaggerheartAdversaryFeatureStateStatus {
  DAGGERHEART_ADVERSARY_FEATURE_STATE_STATUS_UNSPECIFIED = 0;
  DAGGERHEART_ADVERSARY_FEATURE_STATE_STATUS_READY = 1;
  DAGGERHEART_ADVERSARY_FEATURE_STATE_STATUS_ACTIVE = 2;
  DAGGERHEART_ADVERSARY_FEATURE_STATE_STATUS_COOLDOWN = 3;
  DAGGERHEART_ADVERSARY_FEATURE_STATE_STATUS_SPENT = 4;
  DAGGERHEART_ADVERSARY_FEATURE_STATE_STATUS_STAGED = 5;
}

message DaggerheartAdversaryFeatureState {
  string feature_id = 1;
  DaggerheartAdversaryFeatureStateStatus status = 2;
  string focused_target_id = 3;
}

message DaggerheartAdversaryPendingExperience {
  string name = 1;
  int32 modifier = 2;
}

message DaggerheartSubclassState {
  bool battle_ritual_used_this_long_rest = 1;
  int32 gifted_performer_relaxing_song_uses = 2;
  int32 gifted_performer_epic_song_uses = 3;
  int32 gifted_performer_heartbreaking_song_uses = 4;
  int32 contacts_everywhere_uses_this_session = 5;
  int32 contacts_everywhere_action_die_bonus = 6;
  int32 contacts_everywhere_damage_dice_bonus_count = 7;
  int32 sparing_touch_uses_this_long_rest = 8;
  int32 elementalist_action_bonus = 9;
  int32 elementalist_damage_bonus = 10;
  bool transcendence_active = 11;
  string transcendence_trait_bonus_target = 12;
  int32 transcendence_trait_bonus_value = 13;
  int32 transcendence_proficiency_bonus = 14;
  int32 transcendence_evasion_bonus = 15;
  int32 transcendence_severe_threshold_bonus = 16;
  bool clarity_of_nature_used_this_long_rest = 17;
  string elemental_channel = 18;
  string nemesis_target_id = 19;
  bool rousing_speech_used_this_long_rest = 20;
  bool wardens_protection_used_this_long_rest = 21;
}

message DaggerheartUnstoppableState {
  bool active = 1;
  int32 current_value = 2;
  int32 die_sides = 3;
  bool used_this_long_rest = 4;
}

message DaggerheartBeastformAttackDie {
  int32 count = 1;
  int32 sides = 2;
}

message DaggerheartActiveBeastformState {
  string beastform_id = 1;
  string base_trait = 2;
  string attack_trait = 3;
  int32 trait_bonus = 4;
  int32 evasion_bonus = 5;
  string attack_range = 6;
  repeated DaggerheartBeastformAttackDie damage_dice = 7;
  int32 damage_bonus = 8;
  string damage_type = 9;
  string evolution_trait_override = 10;
  bool drop_on_any_hp_mark = 11;
}

message DaggerheartClassState {
  int32 attack_bonus_until_rest = 1;
  int32 evasion_bonus_until_hit_or_rest = 2;
  int32 difficulty_penalty_until_rest = 3;
  string focus_target_id = 4;
  DaggerheartActiveBeastformState active_beastform = 5;
  reserved 6;
  int32 strange_patterns_number = 7;
  repeated int32 rally_dice = 8;
  repeated int32 prayer_dice = 9;
  DaggerheartUnstoppableState unstoppable = 10;
  bool channel_raw_power_used_this_long_rest = 11;
}

// DaggerheartCreationCompanionInput applies companion-specific creation data
// required by some subclasses.
message DaggerheartCreationCompanionInput {
  string animal_kind = 1;
  string name = 2;
  repeated string experience_ids = 3;
  string attack_description = 4;
  string damage_type = 5;
}

// DaggerheartCreationStepHeritageSelectionInput applies heritage selection in
// creation step 2.
message DaggerheartCreationStepHeritageSelectionInput {
  string ancestry_label = 1;
  string first_feature_ancestry_id = 2;
  string second_feature_ancestry_id = 3;
  string community_id = 4;
}

enum DaggerheartSubclassTrackOrigin {
  DAGGERHEART_SUBCLASS_TRACK_ORIGIN_UNSPECIFIED = 0;
  DAGGERHEART_SUBCLASS_TRACK_ORIGIN_PRIMARY = 1;
  DAGGERHEART_SUBCLASS_TRACK_ORIGIN_MULTICLASS = 2;
}

enum DaggerheartSubclassTrackRank {
  DAGGERHEART_SUBCLASS_TRACK_RANK_UNSPECIFIED = 0;
  DAGGERHEART_SUBCLASS_TRACK_RANK_FOUNDATION = 1;
  DAGGERHEART_SUBCLASS_TRACK_RANK_SPECIALIZATION = 2;
  DAGGERHEART_SUBCLASS_TRACK_RANK_MASTERY = 3;
}

message DaggerheartSubclassTrack {
  DaggerheartSubclassTrackOrigin origin = 1;
  string class_id = 2;
  string subclass_id = 3;
  DaggerheartSubclassTrackRank rank = 4;
  string domain_id = 5;
}

message DaggerheartActiveSubclassFeature {
  string id = 1;
  string name = 2;
  string description = 3;
  int32 level = 4;
}

message DaggerheartActiveClassFeature {
  string id = 1;
  string name = 2;
  string description = 3;
  int32 level = 4;
  bool hope_feature = 5;
}

// DaggerheartSheetWeaponSummary captures the display-ready weapon details used
// by the character sheet read surface.
message DaggerheartSheetWeaponSummary {
  string id = 1;
  string name = 2;
  string trait = 3;
  string range = 4;
  string damage_dice = 5;
  string damage_type = 6;
  string feature = 7;
}

// DaggerheartSheetArmorSummary captures the display-ready armor details used by
// the character sheet read surface.
message DaggerheartSheetArmorSummary {
  string id = 1;
  string name = 2;
  int32 base_score = 3;
  string feature = 4;
}

message DaggerheartActiveSubclassTrackFeatures {
  DaggerheartSubclassTrack track = 1;
  repeated DaggerheartActiveSubclassFeature foundation_features = 2;
  repeated DaggerheartActiveSubclassFeature specialization_features = 3;
  repeated DaggerheartActiveSubclassFeature mastery_features = 4;
}

// DaggerheartProfile contains Daggerheart-specific character profile extensions.
// These are static values configured at character creation.
// Wrapper types allow distinguishing "not provided" from "set to zero" in patches.
message DaggerheartProfile {
  // Character level (1-10).
  // Plain int32: 0 is never valid, so 0 means "not provided" in patches.
  int32 level = 1;
  // Maximum hit points (typically 6 for PCs, 3 for NPCs).
  // Plain int32: 0 is never valid (can't have 0 max HP), so current behavior is correct.
  int32 hp_max = 2;
  // Maximum stress before breakdown (typically 6).
  // Wrapper type allows setting to 0 explicitly (e.g., for NPCs).
  google.protobuf.Int32Value stress_max = 3;
  // Evasion target number for attacks against this character.
  // Wrapper type allows setting to 0 explicitly.
  google.protobuf.Int32Value evasion = 4;
  // Damage threshold for major wounds.
  // Wrapper type allows setting to 0 explicitly.
  google.protobuf.Int32Value major_threshold = 5;
  // Damage threshold for severe wounds.
  // Wrapper type allows setting to 0 explicitly.
  google.protobuf.Int32Value severe_threshold = 6;

  // Damage proficiency for weapons and attacks.
  google.protobuf.Int32Value proficiency = 7;
  // Armor base score.
  google.protobuf.Int32Value armor_score = 8;
  // Maximum armor slots.
  google.protobuf.Int32Value armor_max = 9;

  // Daggerheart traits (range: -2 to +4).
  google.protobuf.Int32Value agility = 10;
  google.protobuf.Int32Value strength = 11;
  google.protobuf.Int32Value finesse = 12;
  google.protobuf.Int32Value instinct = 13;
  google.protobuf.Int32Value presence = 14;
  google.protobuf.Int32Value knowledge = 15;

  // Character experiences.
  repeated DaggerheartExperience experiences = 16;

  // Step 1: selected class content id.
  string class_id = 17;

  // Step 1: selected subclass content id.
  string subclass_id = 18;

  // Step 1: subclass-scoped creation requirements resolved at apply time.
  repeated string subclass_creation_requirements = 19;

  // Step 2: selected ancestry/community heritage bundle.
  DaggerheartHeritageSelection heritage = 20;

  // Step 3: whether traits were explicitly assigned during creation.
  google.protobuf.BoolValue traits_assigned = 21;

  // Step 8: free-form background text.
  string background = 22;

  // Step 6: selected domain card ids.
  repeated string domain_card_ids = 23;

  // Step 9: free-form character connections text.
  string connections = 24;

  // Step 7: whether additional character details were explicitly recorded.
  google.protobuf.BoolValue details_recorded = 25;

  // Step 4: selected starting weapon ids.
  repeated string starting_weapon_ids = 26;

  // Step 4: selected starting armor id.
  string starting_armor_id = 27;

  // Step 4: selected starting potion item id.
  string starting_potion_item_id = 28;

  // Step 7: free-form character description (appearance, personality, etc.).
  string description = 29;

  // Step 1: static companion sheet required by some subclasses.
  DaggerheartCompanionSheet companion_sheet = 30;

  // Current equipped armor id used by runtime armor rules and swap flows.
  string equipped_armor_id = 31;

  // Current bonus applied to spellcast rolls by the equipped armor.
  google.protobuf.Int32Value spellcast_roll_bonus = 32;

  // Authoritative unlocked primary and multiclass subclass progression tracks.
  repeated DaggerheartSubclassTrack subclass_tracks = 33;

  // Derived active subclass features grouped by track and unlocked stage.
  repeated DaggerheartActiveSubclassTrackFeatures active_subclass_features = 34;

  // Derived active class features from the selected primary class.
  repeated DaggerheartActiveClassFeature active_class_features = 35;

  // Sheet-ready primary weapon summary resolved from selected equipment.
  DaggerheartSheetWeaponSummary primary_weapon = 36;

  // Sheet-ready secondary weapon summary resolved from selected equipment.
  DaggerheartSheetWeaponSummary secondary_weapon = 37;

  // Sheet-ready active armor summary resolved from selected equipment.
  DaggerheartSheetArmorSummary active_armor = 38;
}

// DaggerheartCreationStepClassSubclassInput applies creation step 1
// (class and subclass selection).
message DaggerheartCreationStepClassSubclassInput {
  string class_id = 1;
  string subclass_id = 2;
  DaggerheartCreationCompanionInput companion = 3;
}

// DaggerheartCreationStepHeritageInput applies creation step 2
// (ancestry and community selection).
message DaggerheartCreationStepHeritageInput {
  DaggerheartCreationStepHeritageSelectionInput heritage = 1;
}

// DaggerheartCreationStepTraitsInput applies creation step 3 (trait assignment).
message DaggerheartCreationStepTraitsInput {
  int32 agility = 1;
  int32 strength = 2;
  int32 finesse = 3;
  int32 instinct = 4;
  int32 presence = 5;
  int32 knowledge = 6;
}

// DaggerheartCreationStepDetailsInput applies creation step 7
// (record additional character details).
message DaggerheartCreationStepDetailsInput {
  // Optional free-form character description.
  string description = 1;
}

// DaggerheartCreationStepEquipmentInput applies creation step 4
// (choose starting equipment).
message DaggerheartCreationStepEquipmentInput {
  repeated string weapon_ids = 1;
  string armor_id = 2;
  string potion_item_id = 3;
}

// DaggerheartCreationStepBackgroundInput applies creation step 8 (background).
message DaggerheartCreationStepBackgroundInput {
  string background = 1;
}

// DaggerheartCreationStepExperiencesInput applies creation step 5 (experiences).
message DaggerheartCreationStepExperiencesInput {
  repeated DaggerheartExperience experiences = 1;
}

// DaggerheartCreationStepDomainCardsInput applies creation step 6 (domain cards).
message DaggerheartCreationStepDomainCardsInput {
  repeated string domain_card_ids = 1;
}

// DaggerheartCreationStepConnectionsInput applies creation step 9 (connections).
message DaggerheartCreationStepConnectionsInput {
  string connections = 1;
}

// DaggerheartCreationStepInput carries exactly one Daggerheart creation step payload.
message DaggerheartCreationStepInput {
  oneof step {
    DaggerheartCreationStepClassSubclassInput class_subclass_input = 1;
    DaggerheartCreationStepHeritageInput heritage_input = 2;
    DaggerheartCreationStepTraitsInput traits_input = 3;
    DaggerheartCreationStepDetailsInput details_input = 4;
    DaggerheartCreationStepEquipmentInput equipment_input = 5;
    DaggerheartCreationStepBackgroundInput background_input = 6;
    DaggerheartCreationStepExperiencesInput experiences_input = 7;
    DaggerheartCreationStepDomainCardsInput domain_cards_input = 8;
    DaggerheartCreationStepConnectionsInput connections_input = 9;
  }
}

// DaggerheartCreationWorkflowInput carries all nine creation step payloads.
// Servers apply these in canonical step order as one atomic workflow update.
message DaggerheartCreationWorkflowInput {
  DaggerheartCreationStepClassSubclassInput class_subclass_input = 1;
  DaggerheartCreationStepHeritageInput heritage_input = 2;
  DaggerheartCreationStepTraitsInput traits_input = 3;
  DaggerheartCreationStepDetailsInput details_input = 4;
  DaggerheartCreationStepEquipmentInput equipment_input = 5;
  DaggerheartCreationStepBackgroundInput background_input = 6;
  DaggerheartCreationStepExperiencesInput experiences_input = 7;
  DaggerheartCreationStepDomainCardsInput domain_cards_input = 8;
  DaggerheartCreationStepConnectionsInput connections_input = 9;
}

// DaggerheartCondition enumerates supported character conditions.
enum DaggerheartCondition {
  DAGGERHEART_CONDITION_UNSPECIFIED = 0;
  DAGGERHEART_CONDITION_HIDDEN = 1;
  DAGGERHEART_CONDITION_RESTRAINED = 2;
  DAGGERHEART_CONDITION_VULNERABLE = 3;
  DAGGERHEART_CONDITION_CLOAKED = 4;
}

enum DaggerheartConditionClass {
  DAGGERHEART_CONDITION_CLASS_UNSPECIFIED = 0;
  DAGGERHEART_CONDITION_CLASS_STANDARD = 1;
  DAGGERHEART_CONDITION_CLASS_TAG = 2;
  DAGGERHEART_CONDITION_CLASS_SPECIAL = 3;
}

enum DaggerheartConditionClearTrigger {
  DAGGERHEART_CONDITION_CLEAR_TRIGGER_UNSPECIFIED = 0;
  DAGGERHEART_CONDITION_CLEAR_TRIGGER_SHORT_REST = 1;
  DAGGERHEART_CONDITION_CLEAR_TRIGGER_LONG_REST = 2;
  DAGGERHEART_CONDITION_CLEAR_TRIGGER_SESSION_END = 3;
  DAGGERHEART_CONDITION_CLEAR_TRIGGER_DAMAGE_TAKEN = 4;
}

message DaggerheartConditionState {
  string id = 1;
  DaggerheartConditionClass class = 2;
  DaggerheartCondition standard = 3;
  string code = 4;
  string label = 5;
  string source = 6;
  string source_id = 7;
  repeated DaggerheartConditionClearTrigger clear_triggers = 8;
}

// DaggerheartStatModifier represents a runtime stat modifier applied to a
// character, tracking source and duration-based clearing.
message DaggerheartStatModifier {
  string id = 1;
  // Target stat: "evasion", "major_threshold", "severe_threshold", "proficiency", "armor_score".
  string target = 2;
  int32 delta = 3;
  string label = 4;
  string source = 5;
  string source_id = 6;
  repeated DaggerheartConditionClearTrigger clear_triggers = 7;
}

// DaggerheartLifeState represents a character's life state.
enum DaggerheartLifeState {
  DAGGERHEART_LIFE_STATE_UNSPECIFIED = 0;
  DAGGERHEART_LIFE_STATE_ALIVE = 1;
  DAGGERHEART_LIFE_STATE_UNCONSCIOUS = 2;
  DAGGERHEART_LIFE_STATE_BLAZE_OF_GLORY = 3;
  DAGGERHEART_LIFE_STATE_DEAD = 4;
}

// DaggerheartDeathMove enumerates supported death move options.
enum DaggerheartDeathMove {
  DAGGERHEART_DEATH_MOVE_UNSPECIFIED = 0;
  DAGGERHEART_DEATH_MOVE_BLAZE_OF_GLORY = 1;
  DAGGERHEART_DEATH_MOVE_AVOID_DEATH = 2;
  DAGGERHEART_DEATH_MOVE_RISK_IT_ALL = 3;
}

// DaggerheartCharacterState contains Daggerheart-specific mutable character state.
// This is materialized as a projection derived from the event journal.
message DaggerheartCharacterState {
  // Current hit points (0 to hp_max from profile).
  int32 hp = 1;
  // Current hope value (0-6).
  int32 hope = 2;
  // Maximum hope slots (reduced by scars).
  int32 hope_max = 3;
  // Current stress value (0 to stress_max from profile).
  int32 stress = 4;
  // Current armor slots (0 to armor_max from profile).
  int32 armor = 5;
  // Active structured conditions for the character.
  repeated DaggerheartConditionState condition_states = 6;
  // Current life state.
  DaggerheartLifeState life_state = 7;
  // Active temporary armor buckets.
  repeated DaggerheartTemporaryArmorBucket temporary_armor_buckets = 8;
  // Whether the equipped armor's once-per-short-rest survival effect has been used.
  bool impenetrable_used_this_short_rest = 9;
  // Mutable class-owned runtime state.
  DaggerheartClassState class_state = 10;
  // Mutable companion-owned runtime state.
  DaggerheartCompanionState companion_state = 11;
  // Mutable subclass-owned runtime state.
  DaggerheartSubclassState subclass_state = 12;
  // Active stat modifiers applied by domain cards, class features, etc.
  repeated DaggerheartStatModifier stat_modifiers = 13;
}

// DaggerheartTemporaryArmorBucket tracks a temporary armor source.
message DaggerheartTemporaryArmorBucket {
  // Source identifier for the temporary armor.
  string source = 1;
  // Duration bucket key that controls clearing rules.
  string duration = 2;
  // Optional stable source id for merge/replace.
  string source_id = 3;
  // Armor amount added by this bucket.
  int32 amount = 4;
}

// DaggerheartSnapshot contains Daggerheart-specific campaign-level state.
// This is materialized as a projection derived from the event journal.
message DaggerheartSnapshot {
  // Current GM Fear value (0-12).
  int32 gm_fear = 1;
  // Count of consecutive short rests.
  int32 consecutive_short_rests = 2;
}

enum DaggerheartRestType {
  DAGGERHEART_REST_TYPE_UNSPECIFIED = 0;
  DAGGERHEART_REST_TYPE_SHORT = 1;
  DAGGERHEART_REST_TYPE_LONG = 2;
}

enum DaggerheartProjectAdvanceMode {
  DAGGERHEART_PROJECT_ADVANCE_MODE_UNSPECIFIED = 0;
  DAGGERHEART_PROJECT_ADVANCE_MODE_AUTO = 1;
  DAGGERHEART_PROJECT_ADVANCE_MODE_GM_SET_DELTA = 2;
}

enum DaggerheartDamageType {
  DAGGERHEART_DAMAGE_TYPE_UNSPECIFIED = 0;
  DAGGERHEART_DAMAGE_TYPE_PHYSICAL = 1;
  DAGGERHEART_DAMAGE_TYPE_MAGIC = 2;
  DAGGERHEART_DAMAGE_TYPE_MIXED = 3;
}

message DaggerheartDamageRequest {
  int32 amount = 1;
  DaggerheartDamageType damage_type = 2;
  bool resist_physical = 3;
  bool resist_magic = 4;
  bool immune_physical = 5;
  bool immune_magic = 6;
  bool direct = 7;
  bool massive_damage = 8;
  string source = 9;
  repeated string source_character_ids = 10;
}

message DaggerheartRestRequest {
  DaggerheartRestType rest_type = 1;
  bool interrupted = 2;
  common.v1.RngRequest rng = 3;
  string long_term_countdown_id = 4;
  repeated DaggerheartRestParticipant participants = 5;
}

message DaggerheartRestParticipant {
  string character_id = 1;
  repeated DaggerheartDowntimeSelection downtime_moves = 2;
}

message DaggerheartDowntimeSelection {
  oneof move {
    DaggerheartTendToWoundsMove tend_to_wounds = 1;
    DaggerheartClearStressMove clear_stress = 2;
    DaggerheartRepairArmorMove repair_armor = 3;
    DaggerheartPrepareMove prepare = 4;
    DaggerheartTendToAllWoundsMove tend_to_all_wounds = 5;
    DaggerheartClearAllStressMove clear_all_stress = 6;
    DaggerheartRepairAllArmorMove repair_all_armor = 7;
    DaggerheartWorkOnProjectMove work_on_project = 8;
  }
}

message DaggerheartTendToWoundsMove {
  string target_character_id = 1;
  common.v1.RngRequest rng = 2;
}

message DaggerheartClearStressMove {
  common.v1.RngRequest rng = 1;
}

message DaggerheartRepairArmorMove {
  string target_character_id = 1;
  common.v1.RngRequest rng = 2;
}

message DaggerheartPrepareMove {
  string group_id = 1;
}

message DaggerheartTendToAllWoundsMove {
  string target_character_id = 1;
}

message DaggerheartClearAllStressMove {}

message DaggerheartRepairAllArmorMove {
  string target_character_id = 1;
}

message DaggerheartWorkOnProjectMove {
  string countdown_id = 1;
  DaggerheartProjectAdvanceMode advance_mode = 2;
  int32 advance_delta = 3;
  string reason = 4;
}

message DaggerheartLoadoutSwapRequest {
  string card_id = 1;
  int32 recall_cost = 2;
  bool in_rest = 3;
}

// DaggerheartMutationSourceType categorizes why a mutation happened.
enum DaggerheartMutationSourceType {
  DAGGERHEART_MUTATION_SOURCE_TYPE_UNSPECIFIED = 0;
  DAGGERHEART_MUTATION_SOURCE_TYPE_DOMAIN_CARD = 1;
  DAGGERHEART_MUTATION_SOURCE_TYPE_CLASS_FEATURE = 2;
  DAGGERHEART_MUTATION_SOURCE_TYPE_SUBCLASS_FEATURE = 3;
  DAGGERHEART_MUTATION_SOURCE_TYPE_GM_ADJUSTMENT = 4;
  DAGGERHEART_MUTATION_SOURCE_TYPE_ARMOR_EFFECT = 5;
  DAGGERHEART_MUTATION_SOURCE_TYPE_ITEM_EFFECT = 6;
  DAGGERHEART_MUTATION_SOURCE_TYPE_REST_DOWNTIME = 7;
  DAGGERHEART_MUTATION_SOURCE_TYPE_ADVERSARY_FEATURE = 8;
  DAGGERHEART_MUTATION_SOURCE_TYPE_ENVIRONMENT_FEATURE = 9;
  DAGGERHEART_MUTATION_SOURCE_TYPE_OTHER = 10;
}

// DaggerheartMutationSource records the reason a character mutation occurred,
// enabling source attribution in the audit trail and event journal.
message DaggerheartMutationSource {
  DaggerheartMutationSourceType type = 1;
  // Human-readable description of the source (e.g., "Bare Bones domain card").
  string description = 2;
  // Stable identifier for the source entity (e.g., domain card ID, feature ID).
  string source_id = 3;
}
