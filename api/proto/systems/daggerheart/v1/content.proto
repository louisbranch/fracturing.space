message DaggerheartFeature {
  string id = 1;
  string name = 2;
  string description = 3;
  int32 level = 4;
  DaggerheartFeatureAutomationStatus automation_status = 5;
  DaggerheartSubclassFeatureRule subclass_rule = 6;
  DaggerheartClassFeatureRule class_rule = 7;
}

enum DaggerheartFeatureAutomationStatus {
  DAGGERHEART_FEATURE_AUTOMATION_STATUS_UNSPECIFIED = 0;
  DAGGERHEART_FEATURE_AUTOMATION_STATUS_SUPPORTED = 1;
  DAGGERHEART_FEATURE_AUTOMATION_STATUS_UNSUPPORTED = 2;
}

enum DaggerheartSubclassFeatureRuleKind {
  DAGGERHEART_SUBCLASS_FEATURE_RULE_KIND_UNSPECIFIED = 0;
  DAGGERHEART_SUBCLASS_FEATURE_RULE_KIND_THRESHOLD_BONUS = 1;
  DAGGERHEART_SUBCLASS_FEATURE_RULE_KIND_HP_SLOT_BONUS = 2;
  DAGGERHEART_SUBCLASS_FEATURE_RULE_KIND_STRESS_SLOT_BONUS = 3;
  DAGGERHEART_SUBCLASS_FEATURE_RULE_KIND_EVASION_BONUS = 4;
  DAGGERHEART_SUBCLASS_FEATURE_RULE_KIND_EVASION_BONUS_WHILE_HOPE_AT_LEAST = 5;
  DAGGERHEART_SUBCLASS_FEATURE_RULE_KIND_GAIN_HOPE_ON_FAILURE_WITH_FEAR = 6;
  DAGGERHEART_SUBCLASS_FEATURE_RULE_KIND_BONUS_MAGIC_DAMAGE_ON_SUCCESS_WITH_FEAR = 7;
  DAGGERHEART_SUBCLASS_FEATURE_RULE_KIND_BONUS_DAMAGE_WHILE_VULNERABLE = 8;
}

enum DaggerheartSubclassThresholdScope {
  DAGGERHEART_SUBCLASS_THRESHOLD_SCOPE_UNSPECIFIED = 0;
  DAGGERHEART_SUBCLASS_THRESHOLD_SCOPE_ALL = 1;
  DAGGERHEART_SUBCLASS_THRESHOLD_SCOPE_SEVERE_ONLY = 2;
}

message DaggerheartSubclassFeatureRule {
  DaggerheartSubclassFeatureRuleKind kind = 1;
  int32 bonus = 2;
  int32 required_hope_min = 3;
  int32 damage_dice_count = 4;
  int32 damage_die_sides = 5;
  bool use_character_level = 6;
  DaggerheartSubclassThresholdScope threshold_scope = 7;
}

enum DaggerheartClassFeatureRuleKind {
  DAGGERHEART_CLASS_FEATURE_RULE_KIND_UNSPECIFIED = 0;
  DAGGERHEART_CLASS_FEATURE_RULE_KIND_UNSTOPPABLE = 1;
  DAGGERHEART_CLASS_FEATURE_RULE_KIND_RALLY = 2;
  DAGGERHEART_CLASS_FEATURE_RULE_KIND_BEASTFORM = 3;
  DAGGERHEART_CLASS_FEATURE_RULE_KIND_HUNTERS_FOCUS = 4;
  DAGGERHEART_CLASS_FEATURE_RULE_KIND_CLOAKED = 5;
  DAGGERHEART_CLASS_FEATURE_RULE_KIND_SNEAK_ATTACK = 6;
  DAGGERHEART_CLASS_FEATURE_RULE_KIND_PRAYER_DICE = 7;
  DAGGERHEART_CLASS_FEATURE_RULE_KIND_CHANNEL_RAW_POWER = 8;
  DAGGERHEART_CLASS_FEATURE_RULE_KIND_PARTING_STRIKE = 9;
  DAGGERHEART_CLASS_FEATURE_RULE_KIND_COMBAT_TRAINING = 10;
  DAGGERHEART_CLASS_FEATURE_RULE_KIND_STRANGE_PATTERNS = 11;
}

message DaggerheartClassFeatureRule {
  DaggerheartClassFeatureRuleKind kind = 1;
  int32 bonus = 2;
