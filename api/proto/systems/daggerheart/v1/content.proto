  DAGGERHEART_ADVERSARY_FEATURE_RULE_KIND_UNSPECIFIED = 0;
  DAGGERHEART_ADVERSARY_FEATURE_RULE_KIND_MOMENTUM_GAIN_FEAR_ON_SUCCESSFUL_ATTACK = 1;
  DAGGERHEART_ADVERSARY_FEATURE_RULE_KIND_TERRIFYING_HOPE_LOSS_ON_SUCCESSFUL_ATTACK = 2;
  DAGGERHEART_ADVERSARY_FEATURE_RULE_KIND_GROUP_ATTACK = 3;
  DAGGERHEART_ADVERSARY_FEATURE_RULE_KIND_HIDDEN_UNTIL_NEXT_ATTACK = 4;
  DAGGERHEART_ADVERSARY_FEATURE_RULE_KIND_DAMAGE_REPLACEMENT_ON_ADVANTAGED_ATTACK = 5;
  DAGGERHEART_ADVERSARY_FEATURE_RULE_KIND_DIFFICULTY_BONUS_WHILE_ACTIVE = 6;
  DAGGERHEART_ADVERSARY_FEATURE_RULE_KIND_CONDITIONAL_DAMAGE_REPLACEMENT_WITH_CONTRIBUTOR = 7;
  DAGGERHEART_ADVERSARY_FEATURE_RULE_KIND_ARMOR_SHRED_ON_SUCCESSFUL_ATTACK = 8;
  DAGGERHEART_ADVERSARY_FEATURE_RULE_KIND_RETALIATORY_DAMAGE_ON_CLOSE_HIT = 9;
  DAGGERHEART_ADVERSARY_FEATURE_RULE_KIND_FOCUS_TARGET_DISADVANTAGE = 10;
}

message DaggerheartAdversaryFeatureRule {
  DaggerheartAdversaryFeatureRuleKind kind = 1;
  int32 fear_gain = 2;
  int32 hope_loss = 3;
  int32 difficulty_bonus = 4;
  repeated DiceSpec damage_dice = 5;
  int32 damage_bonus = 6;
  DaggerheartDamageType damage_type = 7;
  bool requires_advantage = 8;
  bool requires_contributor = 9;
}

message DaggerheartAdversaryFeature {
  string id = 1;
  string name = 2;
  string kind = 3;
  string description = 4;
  string cost_type = 5;
