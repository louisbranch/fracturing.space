  DAGGERHEART_HOPE_FEATURE_RULE_KIND_ROGUES_DODGE = 5;
  DAGGERHEART_HOPE_FEATURE_RULE_KIND_LIFE_SUPPORT = 6;
  DAGGERHEART_HOPE_FEATURE_RULE_KIND_VOLATILE_MAGIC = 7;
  DAGGERHEART_HOPE_FEATURE_RULE_KIND_NO_MERCY = 8;
  DAGGERHEART_HOPE_FEATURE_RULE_KIND_NOT_THIS_TIME = 9;
}

message DaggerheartHopeFeatureRule {
  DaggerheartHopeFeatureRuleKind kind = 1;
  int32 bonus = 2;
  int32 hope_cost = 3;
}

message DaggerheartHopeFeature {
  string name = 1;
  string description = 2;
  int32 hope_cost = 3;
  DaggerheartFeatureAutomationStatus automation_status = 4;
  DaggerheartHopeFeatureRule hope_feature_rule = 5;
