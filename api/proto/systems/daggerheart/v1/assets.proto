syntax = "proto3";

package systems.daggerheart.v1;

import "common/v1/locale.proto";

option go_package = "github.com/louisbranch/fracturing.space/api/gen/go/systems/daggerheart/v1;daggerheartv1";

service DaggerheartAssetService {
  rpc GetAssetMap(GetDaggerheartAssetMapRequest) returns (GetDaggerheartAssetMapResponse);
}

message GetDaggerheartAssetMapRequest {
  // Optional locale for localized text fields.
  common.v1.Locale locale = 1;
}

message GetDaggerheartAssetMapResponse {
  DaggerheartAssetMap asset_map = 1;
}

enum DaggerheartAssetType {
  DAGGERHEART_ASSET_TYPE_UNSPECIFIED = 0;
  DAGGERHEART_ASSET_TYPE_CLASS_ILLUSTRATION = 1;
  DAGGERHEART_ASSET_TYPE_CLASS_ICON = 2;
  DAGGERHEART_ASSET_TYPE_SUBCLASS_ILLUSTRATION = 3;
  DAGGERHEART_ASSET_TYPE_ANCESTRY_ILLUSTRATION = 4;
  DAGGERHEART_ASSET_TYPE_COMMUNITY_ILLUSTRATION = 5;
  DAGGERHEART_ASSET_TYPE_DOMAIN_ILLUSTRATION = 6;
  DAGGERHEART_ASSET_TYPE_DOMAIN_ICON = 7;
  DAGGERHEART_ASSET_TYPE_DOMAIN_CARD_ILLUSTRATION = 8;
  DAGGERHEART_ASSET_TYPE_ADVERSARY_ILLUSTRATION = 9;
  DAGGERHEART_ASSET_TYPE_ENVIRONMENT_ILLUSTRATION = 10;
  DAGGERHEART_ASSET_TYPE_WEAPON_ILLUSTRATION = 11;
  DAGGERHEART_ASSET_TYPE_ARMOR_ILLUSTRATION = 12;
  DAGGERHEART_ASSET_TYPE_ITEM_ILLUSTRATION = 13;
}

enum DaggerheartAssetStatus {
  DAGGERHEART_ASSET_STATUS_UNSPECIFIED = 0;
  DAGGERHEART_ASSET_STATUS_MAPPED = 1;
  DAGGERHEART_ASSET_STATUS_SET_DEFAULT = 2;
  DAGGERHEART_ASSET_STATUS_UNAVAILABLE = 3;
}

message DaggerheartAssetRef {
  DaggerheartAssetType type = 1;
  DaggerheartAssetStatus status = 2;
  string entity_type = 3;
  string entity_id = 4;
  string set_id = 5;
  string asset_id = 6;
  string cdn_asset_id = 7;
}

message DaggerheartAssetMap {
  string id = 1;
  string system_id = 2;
  string system_version = 3;
  common.v1.Locale locale = 4;
  string theme = 5;
  repeated DaggerheartAssetRef assets = 6;
}
