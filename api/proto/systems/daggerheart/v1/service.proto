}

message DaggerheartResolveSceneCountdownTriggerRequest {
  string campaign_id = 1;
  string session_id = 2;
  string countdown_id = 3;
  string scene_id = 4;
  string reason = 5;
}

message DaggerheartResolveSceneCountdownTriggerResponse {
  DaggerheartSceneCountdown countdown = 1;
}

message DaggerheartDeleteSceneCountdownRequest {
  string campaign_id = 1;
  string session_id = 2;
  string countdown_id = 3;
  string reason = 4;
  string scene_id = 5;
}

message DaggerheartDeleteSceneCountdownResponse {
