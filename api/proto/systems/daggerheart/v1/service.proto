syntax = "proto3";

package systems.daggerheart.v1;

import "common/v1/rng.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";
import "systems/daggerheart/v1/mechanics.proto";
import "systems/daggerheart/v1/state.proto";

option go_package = "github.com/louisbranch/fracturing.space/api/gen/go/systems/daggerheart/v1;daggerheartv1";

// DaggerheartService provides Daggerheart-specific game mechanics.
// This includes Duality dice rolling, outcome evaluation, and state mutations.
service DaggerheartService {
  // Daggerheart-style action roll:
  // roll Hope d12 + Fear d12, apply modifier, compare to optional difficulty.
  rpc ActionRoll(ActionRollRequest) returns (ActionRollResponse);

  // Deterministically evaluate a duality outcome from known dice.
  rpc DualityOutcome(DualityOutcomeRequest) returns (DualityOutcomeResponse);

  // Provide a deterministic explanation for a duality outcome.
  rpc DualityExplain(DualityExplainRequest) returns (DualityExplainResponse);

  // Compute probabilities for duality outcomes across all dice pairs.
  rpc DualityProbability(DualityProbabilityRequest) returns (DualityProbabilityResponse);

  // Return ruleset metadata for Duality roll interpretation.
  rpc RulesVersion(RulesVersionRequest) returns (RulesVersionResponse);

  // Roll arbitrary dice sets and return the individual results.
  rpc RollDice(RollDiceRequest) returns (RollDiceResponse);

  // Apply damage to a character (system-specific).
  rpc ApplyDamage(DaggerheartApplyDamageRequest) returns (DaggerheartApplyDamageResponse);

  // Apply damage to an adversary (system-specific).
  rpc ApplyAdversaryDamage(DaggerheartApplyAdversaryDamageRequest) returns (DaggerheartApplyAdversaryDamageResponse);

  // Apply a rest outcome (system-specific).
  rpc ApplyRest(DaggerheartApplyRestRequest) returns (DaggerheartApplyRestResponse);

  // Apply temporary armor to a character (system-specific).
  rpc ApplyTemporaryArmor(DaggerheartApplyTemporaryArmorRequest) returns (DaggerheartApplyTemporaryArmorResponse);

  // Swap a loadout card (system-specific).
  rpc SwapLoadout(DaggerheartSwapLoadoutRequest) returns (DaggerheartSwapLoadoutResponse);

  // Apply a death move (system-specific).
  rpc ApplyDeathMove(DaggerheartApplyDeathMoveRequest) returns (DaggerheartApplyDeathMoveResponse);

  // Apply or clear conditions on a character (system-specific).
  rpc ApplyConditions(DaggerheartApplyConditionsRequest) returns (DaggerheartApplyConditionsResponse);

  // Apply or clear conditions on an adversary (system-specific).
  rpc ApplyAdversaryConditions(DaggerheartApplyAdversaryConditionsRequest) returns (DaggerheartApplyAdversaryConditionsResponse);

  // Apply a GM move (system-specific).
  rpc ApplyGmMove(DaggerheartApplyGmMoveRequest) returns (DaggerheartApplyGmMoveResponse);
  rpc ApplyAdversaryFeature(DaggerheartApplyAdversaryFeatureRequest) returns (DaggerheartApplyAdversaryFeatureResponse);

  // Create a scene countdown (system-specific).
  rpc CreateSceneCountdown(DaggerheartCreateSceneCountdownRequest) returns (DaggerheartCreateSceneCountdownResponse);

  // Advance a scene countdown manually (system-specific).
  rpc AdvanceSceneCountdown(DaggerheartAdvanceSceneCountdownRequest) returns (DaggerheartAdvanceSceneCountdownResponse);

  // Resolve a pending scene countdown trigger (system-specific).
  rpc ResolveSceneCountdownTrigger(DaggerheartResolveSceneCountdownTriggerRequest) returns (DaggerheartResolveSceneCountdownTriggerResponse);

  // Delete a scene countdown (system-specific).
  rpc DeleteSceneCountdown(DaggerheartDeleteSceneCountdownRequest) returns (DaggerheartDeleteSceneCountdownResponse);

  // Get a scene countdown (system-specific).
  rpc GetSceneCountdown(DaggerheartGetSceneCountdownRequest) returns (DaggerheartGetSceneCountdownResponse);

  // List scene countdowns (system-specific).
  rpc ListSceneCountdowns(DaggerheartListSceneCountdownsRequest) returns (DaggerheartListSceneCountdownsResponse);

  // Create a campaign countdown (system-specific).
  rpc CreateCampaignCountdown(DaggerheartCreateCampaignCountdownRequest) returns (DaggerheartCreateCampaignCountdownResponse);

  // Advance a campaign countdown manually (system-specific).
  rpc AdvanceCampaignCountdown(DaggerheartAdvanceCampaignCountdownRequest) returns (DaggerheartAdvanceCampaignCountdownResponse);

  // Resolve a pending campaign countdown trigger (system-specific).
  rpc ResolveCampaignCountdownTrigger(DaggerheartResolveCampaignCountdownTriggerRequest) returns (DaggerheartResolveCampaignCountdownTriggerResponse);

  // Delete a campaign countdown (system-specific).
  rpc DeleteCampaignCountdown(DaggerheartDeleteCampaignCountdownRequest) returns (DaggerheartDeleteCampaignCountdownResponse);

  // Get a campaign countdown (system-specific).
  rpc GetCampaignCountdown(DaggerheartGetCampaignCountdownRequest) returns (DaggerheartGetCampaignCountdownResponse);

  // List campaign countdowns (system-specific).
  rpc ListCampaignCountdowns(DaggerheartListCampaignCountdownsRequest) returns (DaggerheartListCampaignCountdownsResponse);

  // Create an adversary (system-specific).
  rpc CreateAdversary(DaggerheartCreateAdversaryRequest) returns (DaggerheartCreateAdversaryResponse);

  // Update an adversary (system-specific).
  rpc UpdateAdversary(DaggerheartUpdateAdversaryRequest) returns (DaggerheartUpdateAdversaryResponse);

  // Delete an adversary (system-specific).
  rpc DeleteAdversary(DaggerheartDeleteAdversaryRequest) returns (DaggerheartDeleteAdversaryResponse);

  // Get an adversary (system-specific).
  rpc GetAdversary(DaggerheartGetAdversaryRequest) returns (DaggerheartGetAdversaryResponse);

  // List adversaries (system-specific).
  rpc ListAdversaries(DaggerheartListAdversariesRequest) returns (DaggerheartListAdversariesResponse);

  // Create an instantiated environment entity (system-specific).
  rpc CreateEnvironmentEntity(DaggerheartCreateEnvironmentEntityRequest) returns (DaggerheartCreateEnvironmentEntityResponse);

  // Update an instantiated environment entity (system-specific).
  rpc UpdateEnvironmentEntity(DaggerheartUpdateEnvironmentEntityRequest) returns (DaggerheartUpdateEnvironmentEntityResponse);

  // Delete an instantiated environment entity (system-specific).
  rpc DeleteEnvironmentEntity(DaggerheartDeleteEnvironmentEntityRequest) returns (DaggerheartDeleteEnvironmentEntityResponse);

  // Get an instantiated environment entity (system-specific).
  rpc GetEnvironmentEntity(DaggerheartGetEnvironmentEntityRequest) returns (DaggerheartGetEnvironmentEntityResponse);

  // List instantiated environment entities (system-specific).
  rpc ListEnvironmentEntities(DaggerheartListEnvironmentEntitiesRequest) returns (DaggerheartListEnvironmentEntitiesResponse);

  // Resolve a Blaze of Glory finale (system-specific).
  rpc ResolveBlazeOfGlory(DaggerheartResolveBlazeOfGloryRequest) returns (DaggerheartResolveBlazeOfGloryResponse);

  // Roll Duality dice for a session (combines roll + event recording).
  rpc SessionActionRoll(SessionActionRollRequest) returns (SessionActionRollResponse);

  // Roll damage dice for a session (combines roll + event recording).
  rpc SessionDamageRoll(SessionDamageRollRequest) returns (SessionDamageRollResponse);

  // Run a full attack flow (roll, outcome, damage roll, apply damage).
  rpc SessionAttackFlow(SessionAttackFlowRequest) returns (SessionAttackFlowResponse);

  // Run a full reaction flow (roll, outcome, reaction outcome).
  rpc SessionReactionFlow(SessionReactionFlowRequest) returns (SessionReactionFlowResponse);

  // Roll adversary attack dice (d20-based).
  rpc SessionAdversaryAttackRoll(SessionAdversaryAttackRollRequest) returns (SessionAdversaryAttackRollResponse);

  // Resolve an adversary action check (optional dramatic roll).
  rpc SessionAdversaryActionCheck(SessionAdversaryActionCheckRequest) returns (SessionAdversaryActionCheckResponse);

  // Run a full adversary attack flow (roll, outcome, damage roll, apply damage).
  rpc SessionAdversaryAttackFlow(SessionAdversaryAttackFlowRequest) returns (SessionAdversaryAttackFlowResponse);

  // Run a group action flow (supporter reactions + leader roll + outcome).
  rpc SessionGroupActionFlow(SessionGroupActionFlowRequest) returns (SessionGroupActionFlowResponse);

  // Run a tag team flow (two rolls + selected outcome).
  rpc SessionTagTeamFlow(SessionTagTeamFlowRequest) returns (SessionTagTeamFlowResponse);

  // Apply the mandatory outcome effects from a resolved action roll.
  rpc ApplyRollOutcome(ApplyRollOutcomeRequest) returns (ApplyRollOutcomeResponse);

  // Apply an attack outcome from a resolved action roll.
  rpc ApplyAttackOutcome(DaggerheartApplyAttackOutcomeRequest) returns (DaggerheartApplyAttackOutcomeResponse);

  // Apply an adversary attack outcome from a resolved adversary roll.
  rpc ApplyAdversaryAttackOutcome(DaggerheartApplyAdversaryAttackOutcomeRequest) returns (DaggerheartApplyAdversaryAttackOutcomeResponse);

  // Apply a reaction outcome from a resolved reaction roll.
  rpc ApplyReactionOutcome(DaggerheartApplyReactionOutcomeRequest) returns (DaggerheartApplyReactionOutcomeResponse);

  // Apply a level-up to a character (progression).
  rpc ApplyLevelUp(DaggerheartApplyLevelUpRequest) returns (DaggerheartApplyLevelUpResponse);

  // Apply a class feature activation or stateful class choice.
  rpc ApplyClassFeature(DaggerheartApplyClassFeatureRequest) returns (DaggerheartApplyClassFeatureResponse);
  rpc ApplySubclassFeature(DaggerheartApplySubclassFeatureRequest) returns (DaggerheartApplySubclassFeatureResponse);
  rpc TransformBeastform(DaggerheartTransformBeastformRequest) returns (DaggerheartTransformBeastformResponse);
  rpc DropBeastform(DaggerheartDropBeastformRequest) returns (DaggerheartDropBeastformResponse);
  rpc BeginCompanionExperience(DaggerheartBeginCompanionExperienceRequest) returns (DaggerheartBeginCompanionExperienceResponse);
  rpc ReturnCompanion(DaggerheartReturnCompanionRequest) returns (DaggerheartReturnCompanionResponse);

  // Update a character's gold denominations (inventory).
  rpc UpdateGold(DaggerheartUpdateGoldRequest) returns (DaggerheartUpdateGoldResponse);

  // Acquire a domain card into a character's vault or loadout (inventory).
  rpc AcquireDomainCard(DaggerheartAcquireDomainCardRequest) returns (DaggerheartAcquireDomainCardResponse);

  // Swap equipment between active/inventory/none slots (inventory).
  rpc SwapEquipment(DaggerheartSwapEquipmentRequest) returns (DaggerheartSwapEquipmentResponse);

  // Use a consumable, decrementing its quantity (inventory).
  rpc UseConsumable(DaggerheartUseConsumableRequest) returns (DaggerheartUseConsumableResponse);

  // Acquire a consumable, incrementing its quantity (inventory).
  rpc AcquireConsumable(DaggerheartAcquireConsumableRequest) returns (DaggerheartAcquireConsumableResponse);

  // Apply a direct character state patch (HP, Hope, Stress, Armor).
  rpc ApplyCharacterStatePatch(DaggerheartApplyCharacterStatePatchRequest)
      returns (DaggerheartApplyCharacterStatePatchResponse);

  // Add or remove stat modifiers on a character (evasion, thresholds, etc.).
  rpc ApplyStatModifiers(DaggerheartApplyStatModifiersRequest)
      returns (DaggerheartApplyStatModifiersResponse);
}

message DaggerheartApplyDamageRequest {
  string campaign_id = 1;
  string character_id = 2;
  DaggerheartDamageRequest damage = 3;
  optional uint64 roll_seq = 4;
  bool require_damage_roll = 5;
  string scene_id = 6;
  DaggerheartDamageArmorReaction armor_reaction = 7;
  DaggerheartDamageMitigationDecision mitigation_decision = 8;
  bool require_mitigation_choice = 9;
}

message DaggerheartApplyDamageResponse {
  string character_id = 1;
  DaggerheartCharacterState state = 2;
  DaggerheartCombatChoiceRequired choice_required = 3;
}

message DaggerheartApplyAdversaryDamageRequest {
  string campaign_id = 1;
  string adversary_id = 2;
  DaggerheartDamageRequest damage = 3;
  optional uint64 roll_seq = 4;
  bool require_damage_roll = 5;
  string scene_id = 6;
}

message DaggerheartApplyAdversaryDamageResponse {
  string adversary_id = 1;
  DaggerheartAdversary adversary = 2;
}

message DaggerheartApplyRestRequest {
  string campaign_id = 1;
  DaggerheartRestRequest rest = 2;
}

message DaggerheartCharacterStateEntry {
  string character_id = 1;
  DaggerheartCharacterState state = 2;
}

message DaggerheartApplyRestResponse {
  DaggerheartSnapshot snapshot = 1;
  repeated DaggerheartCharacterStateEntry character_states = 2;
  repeated DaggerheartCampaignCountdown campaign_countdowns = 3;
  repeated DaggerheartCountdownAdvance countdown_advances = 4;
}

message DaggerheartTemporaryArmor {
  string source = 1;
  string duration = 2;
  int32 amount = 3;
  string source_id = 4;
}

message DaggerheartApplyTemporaryArmorRequest {
  string campaign_id = 1;
  string character_id = 2;
  DaggerheartTemporaryArmor armor = 3;
  string scene_id = 4;
}

message DaggerheartApplyTemporaryArmorResponse {
  string character_id = 1;
  DaggerheartCharacterState state = 2;
}

message DaggerheartSwapLoadoutRequest {
  string campaign_id = 1;
  string character_id = 2;
  DaggerheartLoadoutSwapRequest swap = 3;
  string scene_id = 4;
}

message DaggerheartSwapLoadoutResponse {
  string character_id = 1;
  DaggerheartCharacterState state = 2;
}

message DaggerheartApplyDeathMoveRequest {
  string campaign_id = 1;
  string character_id = 2;
  DaggerheartDeathMove move = 3;
  optional int32 hp_clear = 4;
  optional int32 stress_clear = 5;
  common.v1.RngRequest rng = 6;
  string scene_id = 7;
}

message DaggerheartDeathMoveResult {
  DaggerheartDeathMove move = 1;
  DaggerheartLifeState life_state = 2;
  optional int32 hope_die = 3;
  optional int32 fear_die = 4;
  int32 hp_cleared = 5;
  int32 stress_cleared = 6;
  bool scar_gained = 7;
}

message DaggerheartApplyDeathMoveResponse {
  string character_id = 1;
  DaggerheartCharacterState state = 2;
  DaggerheartDeathMoveResult result = 3;
}

message DaggerheartApplyConditionsRequest {
  string campaign_id = 1;
  string character_id = 2;
  repeated DaggerheartConditionState add_conditions = 3;
  repeated string remove_condition_ids = 4;
  DaggerheartLifeState life_state = 5;
  string source = 6;
  optional uint64 roll_seq = 7;
  string scene_id = 8;
}

message DaggerheartApplyConditionsResponse {
  string character_id = 1;
  DaggerheartCharacterState state = 2;
  repeated DaggerheartConditionState added_conditions = 3;
  repeated DaggerheartConditionState removed_conditions = 4;
}

message DaggerheartApplyAdversaryConditionsRequest {
  string campaign_id = 1;
  string adversary_id = 2;
  repeated DaggerheartConditionState add_conditions = 3;
  repeated string remove_condition_ids = 4;
  string source = 5;
  optional uint64 roll_seq = 6;
  string scene_id = 7;
}

message DaggerheartApplyAdversaryConditionsResponse {
  string adversary_id = 1;
  DaggerheartAdversary adversary = 2;
  repeated DaggerheartConditionState added_conditions = 3;
  repeated DaggerheartConditionState removed_conditions = 4;
}

enum DaggerheartGmMoveKind {
  DAGGERHEART_GM_MOVE_KIND_UNSPECIFIED = 0;
  DAGGERHEART_GM_MOVE_KIND_INTERRUPT_AND_MOVE = 1;
  DAGGERHEART_GM_MOVE_KIND_ADDITIONAL_MOVE = 2;
}

enum DaggerheartGmMoveShape {
  DAGGERHEART_GM_MOVE_SHAPE_UNSPECIFIED = 0;
  DAGGERHEART_GM_MOVE_SHAPE_SHOW_WORLD_REACTION = 1;
  DAGGERHEART_GM_MOVE_SHAPE_REVEAL_DANGER = 2;
  DAGGERHEART_GM_MOVE_SHAPE_FORCE_SPLIT = 3;
  DAGGERHEART_GM_MOVE_SHAPE_MARK_STRESS = 4;
  DAGGERHEART_GM_MOVE_SHAPE_SHIFT_ENVIRONMENT = 5;
  DAGGERHEART_GM_MOVE_SHAPE_SPOTLIGHT_ADVERSARY = 6;
  DAGGERHEART_GM_MOVE_SHAPE_CAPTURE_IMPORTANT_TARGET = 7;
  DAGGERHEART_GM_MOVE_SHAPE_CUSTOM = 8;
}

message DaggerheartDirectGmMoveTarget {
  DaggerheartGmMoveKind kind = 1;
  DaggerheartGmMoveShape shape = 2;
  string description = 3;
  string adversary_id = 4;
}

message DaggerheartAdversaryFearFeatureTarget {
  string adversary_id = 1;
  string feature_id = 2;
  string description = 3;
}

message DaggerheartEnvironmentFearFeatureTarget {
  string environment_entity_id = 1;
  string feature_id = 2;
  string description = 3;
}

message DaggerheartAdversaryExperienceTarget {
  string adversary_id = 1;
  string experience_name = 2;
  string description = 3;
}

message DaggerheartApplyGmMoveRequest {
  string campaign_id = 1;
  string session_id = 2;
  int32 fear_spent = 3;
  string scene_id = 4;
  oneof spend_target {
    DaggerheartDirectGmMoveTarget direct_move = 5;
    DaggerheartAdversaryFearFeatureTarget adversary_feature = 6;
    DaggerheartEnvironmentFearFeatureTarget environment_feature = 7;
    DaggerheartAdversaryExperienceTarget adversary_experience = 8;
  }
}

message DaggerheartApplyGmMoveResponse {
  string campaign_id = 1;
  int32 gm_fear_before = 2;
  int32 gm_fear_after = 3;
}

message DaggerheartApplyAdversaryFeatureRequest {
  string campaign_id = 1;
  string session_id = 2;
  string adversary_id = 3;
  string feature_id = 4;
  string scene_id = 5;
  string target_character_id = 6;
  string target_adversary_id = 7;
}

message DaggerheartApplyAdversaryFeatureResponse {
  DaggerheartAdversary adversary = 1;
}

enum DaggerheartCountdownTone {
  DAGGERHEART_COUNTDOWN_TONE_UNSPECIFIED = 0;
  DAGGERHEART_COUNTDOWN_TONE_NEUTRAL = 1;
  DAGGERHEART_COUNTDOWN_TONE_PROGRESS = 2;
  DAGGERHEART_COUNTDOWN_TONE_CONSEQUENCE = 3;
}

enum DaggerheartCountdownAdvancementPolicy {
  DAGGERHEART_COUNTDOWN_ADVANCEMENT_POLICY_UNSPECIFIED = 0;
  DAGGERHEART_COUNTDOWN_ADVANCEMENT_POLICY_MANUAL = 1;
  DAGGERHEART_COUNTDOWN_ADVANCEMENT_POLICY_ACTION_STANDARD = 2;
  DAGGERHEART_COUNTDOWN_ADVANCEMENT_POLICY_ACTION_DYNAMIC = 3;
  DAGGERHEART_COUNTDOWN_ADVANCEMENT_POLICY_LONG_REST = 4;
}

enum DaggerheartCountdownLoopBehavior {
  DAGGERHEART_COUNTDOWN_LOOP_BEHAVIOR_UNSPECIFIED = 0;
  DAGGERHEART_COUNTDOWN_LOOP_BEHAVIOR_NONE = 1;
  DAGGERHEART_COUNTDOWN_LOOP_BEHAVIOR_RESET = 2;
  DAGGERHEART_COUNTDOWN_LOOP_BEHAVIOR_RESET_INCREASE_START = 3;
  DAGGERHEART_COUNTDOWN_LOOP_BEHAVIOR_RESET_DECREASE_START = 4;
}

enum DaggerheartCountdownStatus {
  DAGGERHEART_COUNTDOWN_STATUS_UNSPECIFIED = 0;
  DAGGERHEART_COUNTDOWN_STATUS_ACTIVE = 1;
  DAGGERHEART_COUNTDOWN_STATUS_TRIGGER_PENDING = 2;
}

message DaggerheartCountdownRandomizedStart {
  int32 min = 1;
  int32 max = 2;
  common.v1.RngRequest rng = 3;
}

message DaggerheartCountdownStartingRoll {
  int32 min = 1;
  int32 max = 2;
  int32 value = 3;
}

message DaggerheartCountdownAdvance {
  string countdown_id = 1;
  string name = 2;
  DaggerheartCountdownTone tone = 3;
  DaggerheartCountdownAdvancementPolicy advancement_policy = 4;
  int32 starting_value = 5;
  int32 remaining_before = 6;
  int32 remaining_after = 7;
  int32 advanced_by = 8;
  DaggerheartCountdownStatus status_before = 9;
  DaggerheartCountdownStatus status_after = 10;
  bool triggered = 11;
  string reason = 12;
}

message DaggerheartSceneCountdown {
  string countdown_id = 1;
  string campaign_id = 2;
  string session_id = 3;
  string scene_id = 4;
  string name = 5;
  DaggerheartCountdownTone tone = 6;
  DaggerheartCountdownAdvancementPolicy advancement_policy = 7;
  int32 starting_value = 8;
  int32 remaining_value = 9;
  DaggerheartCountdownLoopBehavior loop_behavior = 10;
  DaggerheartCountdownStatus status = 11;
  string linked_countdown_id = 12;
  DaggerheartCountdownStartingRoll starting_roll = 13;
}

message DaggerheartCampaignCountdown {
  string countdown_id = 1;
  string name = 2;
  DaggerheartCountdownTone tone = 3;
  DaggerheartCountdownAdvancementPolicy advancement_policy = 4;
  int32 starting_value = 5;
  int32 remaining_value = 6;
  DaggerheartCountdownLoopBehavior loop_behavior = 7;
  DaggerheartCountdownStatus status = 8;
  string linked_countdown_id = 9;
  DaggerheartCountdownStartingRoll starting_roll = 10;
}

message DaggerheartCreateSceneCountdownRequest {
  string campaign_id = 1;
  string session_id = 2;
  string countdown_id = 3;
  string name = 4;
  string scene_id = 5;
  DaggerheartCountdownTone tone = 6;
  DaggerheartCountdownAdvancementPolicy advancement_policy = 7;
  oneof starting_value {
    int32 fixed_starting_value = 8;
    DaggerheartCountdownRandomizedStart randomized_start = 9;
  }
  DaggerheartCountdownLoopBehavior loop_behavior = 10;
  string linked_countdown_id = 11;
}

message DaggerheartCreateSceneCountdownResponse {
  DaggerheartSceneCountdown countdown = 1;
