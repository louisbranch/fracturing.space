message DaggerheartDropBeastformResponse {
  string character_id = 1;
  DaggerheartCharacterState state = 2;
}

enum DaggerheartCompanionReturnResolution {
  DAGGERHEART_COMPANION_RETURN_RESOLUTION_UNSPECIFIED = 0;
  DAGGERHEART_COMPANION_RETURN_RESOLUTION_EXPERIENCE_COMPLETED = 1;
  DAGGERHEART_COMPANION_RETURN_RESOLUTION_EARLY_RETURN = 2;
}

message DaggerheartBeginCompanionExperienceRequest {
  string campaign_id = 1;
  string character_id = 2;
  string session_id = 3;
  string scene_id = 4;
  string experience_id = 5;
}

message DaggerheartBeginCompanionExperienceResponse {
  string character_id = 1;
  DaggerheartCharacterState state = 2;
}

message DaggerheartReturnCompanionRequest {
  string campaign_id = 1;
  string character_id = 2;
  string session_id = 3;
  string scene_id = 4;
  DaggerheartCompanionReturnResolution resolution = 5;
}

message DaggerheartReturnCompanionResponse {
  string character_id = 1;
  DaggerheartCharacterState state = 2;
}

// --- Inventory messages ---

message DaggerheartUpdateGoldRequest {
  string campaign_id = 1;
  string character_id = 2;
  int32 handfuls_before = 3;
  int32 handfuls_after = 4;
  int32 bags_before = 5;
  int32 bags_after = 6;
  int32 chests_before = 7;
  int32 chests_after = 8;
  string reason = 9;
}

message DaggerheartUpdateGoldResponse {
  string character_id = 1;
  int32 handfuls = 2;
  int32 bags = 3;
  int32 chests = 4;
}

message DaggerheartAcquireDomainCardRequest {
  string campaign_id = 1;
  string character_id = 2;
  string card_id = 3;
  int32 card_level = 4;
  // Destination: "vault" or "loadout".
  string destination = 5;
}

message DaggerheartAcquireDomainCardResponse {
  string character_id = 1;
}

message DaggerheartSwapEquipmentRequest {
  string campaign_id = 1;
  string character_id = 2;
  string item_id = 3;
  // Item type: "weapon" or "armor".
  string item_type = 4;
  // Source slot: "active", "inventory", or "none".
  string from = 5;
  // Target slot: "active", "inventory", or "none".
  string to = 6;
  // Stress cost for mid-session swaps.
  int32 stress_cost = 7;
}

message DaggerheartSwapEquipmentResponse {
  string character_id = 1;
}

message DaggerheartUseConsumableRequest {
  string campaign_id = 1;
  string character_id = 2;
  string consumable_id = 3;
  int32 quantity_before = 4;
  int32 quantity_after = 5;
}

message DaggerheartUseConsumableResponse {
  string character_id = 1;
}

message DaggerheartAcquireConsumableRequest {
  string campaign_id = 1;
  string character_id = 2;
  string consumable_id = 3;
  int32 quantity_before = 4;
  int32 quantity_after = 5;
}

message DaggerheartAcquireConsumableResponse {
  string character_id = 1;
}

message DaggerheartApplyCharacterStatePatchRequest {
  string campaign_id = 1;
  string character_id = 2;
  optional int32 hp = 3;
  optional int32 hope = 4;
  optional int32 stress = 5;
  optional int32 armor = 6;
  string source = 7;
  DaggerheartMutationSource mutation_source = 8;
}

message DaggerheartApplyCharacterStatePatchResponse {
  string character_id = 1;
  optional int32 hp = 2;
  optional int32 hope = 3;
  optional int32 stress = 4;
  optional int32 armor = 5;
}

message DaggerheartApplyStatModifiersRequest {
  string campaign_id = 1;
  string character_id = 2;
  repeated DaggerheartStatModifier add_modifiers = 3;
  repeated string remove_modifier_ids = 4;
  string source = 5;
}

message DaggerheartApplyStatModifiersResponse {
  string character_id = 1;
  repeated DaggerheartStatModifier active_modifiers = 2;
  repeated DaggerheartStatModifier added = 3;
  repeated DaggerheartStatModifier removed = 4;
}
