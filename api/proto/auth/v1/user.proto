syntax = "proto3";

package auth.v1;

import "common/v1/locale.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/louisbranch/fracturing.space/api/gen/go/auth/v1;authv1";

// User represents one authenticated pseudonymous account record.
message User {
  string id = 1;
  string username = 2;
  common.v1.Locale locale = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

// WebSession stores durable authenticated browser session state.
message WebSession {
  string id = 1;
  string user_id = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp expires_at = 4;
  google.protobuf.Timestamp revoked_at = 5;
}

// PasskeyCredentialSummary stores one registered passkey summary.
message PasskeyCredentialSummary {
  string credential_id = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
  google.protobuf.Timestamp last_used_at = 4;
}

// AuthService provides account, passkey, and session operations.
service AuthService {
  // Begin a username-backed account registration ceremony.
  rpc BeginAccountRegistration(BeginAccountRegistrationRequest) returns (BeginAccountRegistrationResponse);

  // Finish account registration, create the first passkey, and issue the recovery code.
  rpc FinishAccountRegistration(FinishAccountRegistrationRequest) returns (FinishAccountRegistrationResponse);

  // Acknowledge the staged recovery code and activate the account.
  rpc AcknowledgeAccountRegistration(AcknowledgeAccountRegistrationRequest) returns (AcknowledgeAccountRegistrationResponse);

  // Begin an authenticated passkey registration ceremony for an existing user.
  rpc BeginPasskeyRegistration(BeginPasskeyRegistrationRequest) returns (BeginPasskeyRegistrationResponse);

  // Finish an authenticated passkey registration ceremony.
  rpc FinishPasskeyRegistration(FinishPasskeyRegistrationRequest) returns (FinishPasskeyRegistrationResponse);

  // Begin a passkey login ceremony for a username.
  rpc BeginPasskeyLogin(BeginPasskeyLoginRequest) returns (BeginPasskeyLoginResponse);

  // Finish a passkey login ceremony.
  rpc FinishPasskeyLogin(FinishPasskeyLoginRequest) returns (FinishPasskeyLoginResponse);

  // Verify a recovery code and create a narrow recovery session.
  rpc BeginAccountRecovery(BeginAccountRecoveryRequest) returns (BeginAccountRecoveryResponse);

  // Begin replacement passkey registration for a recovery session.
  rpc BeginRecoveryPasskeyRegistration(BeginRecoveryPasskeyRegistrationRequest) returns (BeginPasskeyRegistrationResponse);

  // Finish replacement passkey registration, rotate recovery state, and issue a web session.
  rpc FinishRecoveryPasskeyRegistration(FinishRecoveryPasskeyRegistrationRequest) returns (FinishAccountRegistrationResponse);

  // Create a durable web session for an authenticated user.
  rpc CreateWebSession(CreateWebSessionRequest) returns (CreateWebSessionResponse);

  // Resolve a durable web session by ID.
  rpc GetWebSession(GetWebSessionRequest) returns (GetWebSessionResponse);

  // Revoke a durable web session by ID.
  rpc RevokeWebSession(RevokeWebSessionRequest) returns (RevokeWebSessionResponse);

  // List registered passkeys for a user.
  rpc ListPasskeys(ListPasskeysRequest) returns (ListPasskeysResponse);

  // Issue a join grant for a campaign invite.
  rpc IssueJoinGrant(IssueJoinGrantRequest) returns (IssueJoinGrantResponse);

  // Resolve a user by username.
  rpc LookupUserByUsername(LookupUserByUsernameRequest) returns (LookupUserByUsernameResponse);

  // Check whether a username is valid and currently available.
  rpc CheckUsernameAvailability(CheckUsernameAvailabilityRequest) returns (CheckUsernameAvailabilityResponse);

  // Get a user record by ID.
  rpc GetUser(GetUserRequest) returns (GetUserResponse);

  // List user records.
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

  // Lease due integration outbox events for background worker processing.
  rpc LeaseIntegrationOutboxEvents(LeaseIntegrationOutboxEventsRequest) returns (LeaseIntegrationOutboxEventsResponse);

  // Acknowledge processing outcome for one leased integration outbox event.
  rpc AckIntegrationOutboxEvent(AckIntegrationOutboxEventRequest) returns (AckIntegrationOutboxEventResponse);
}

message BeginAccountRegistrationRequest {
  string username = 1;
  common.v1.Locale locale = 2;
}

message BeginAccountRegistrationResponse {
  string session_id = 1;
  bytes credential_creation_options_json = 2;
}

message FinishAccountRegistrationRequest {
  string session_id = 1;
  bytes credential_response_json = 2;
}

message FinishAccountRegistrationResponse {
  User user = 1;
  string credential_id = 2;
  WebSession session = 3;
  string recovery_code = 4;
}

message AcknowledgeAccountRegistrationRequest {
  string session_id = 1;
  string pending_id = 2;
}

message AcknowledgeAccountRegistrationResponse {
  User user = 1;
  WebSession session = 2;
}

message BeginPasskeyRegistrationRequest {
  string user_id = 1;
}

message BeginPasskeyRegistrationResponse {
  string session_id = 1;
  bytes credential_creation_options_json = 2;
}

message FinishPasskeyRegistrationRequest {
  string session_id = 1;
  bytes credential_response_json = 2;
}

message FinishPasskeyRegistrationResponse {
  User user = 1;
  string credential_id = 2;
}

message BeginPasskeyLoginRequest {
  string username = 1;
}

message BeginPasskeyLoginResponse {
  string session_id = 1;
  bytes credential_request_options_json = 2;
}

message FinishPasskeyLoginRequest {
  string session_id = 1;
  bytes credential_response_json = 2;
  string pending_id = 3;
}

message FinishPasskeyLoginResponse {
  User user = 1;
  string credential_id = 2;
}

message BeginAccountRecoveryRequest {
  string username = 1;
  string recovery_code = 2;
}

message BeginAccountRecoveryResponse {
  string recovery_session_id = 1;
}

message BeginRecoveryPasskeyRegistrationRequest {
  string recovery_session_id = 1;
}

message FinishRecoveryPasskeyRegistrationRequest {
  string recovery_session_id = 1;
  string session_id = 2;
  bytes credential_response_json = 3;
  string pending_id = 4;
}

message CreateWebSessionRequest {
  string user_id = 1;
  int64 ttl_seconds = 2;
}

message CreateWebSessionResponse {
  WebSession session = 1;
  User user = 2;
}

message GetWebSessionRequest {
  string session_id = 1;
}

message GetWebSessionResponse {
  WebSession session = 1;
  User user = 2;
}

message RevokeWebSessionRequest {
  string session_id = 1;
}

message RevokeWebSessionResponse {}

message ListPasskeysRequest {
  string user_id = 1;
}

message ListPasskeysResponse {
  repeated PasskeyCredentialSummary passkeys = 1;
}

message IssueJoinGrantRequest {
  string user_id = 1;
  string campaign_id = 2;
  string invite_id = 3;
  string participant_id = 4;
}

message IssueJoinGrantResponse {
  string join_grant = 1;
  string jti = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message LookupUserByUsernameRequest {
  string username = 1;
}

message LookupUserByUsernameResponse {
  User user = 1;
}

enum UsernameAvailabilityState {
  USERNAME_AVAILABILITY_STATE_UNSPECIFIED = 0;
  USERNAME_AVAILABILITY_STATE_INVALID = 1;
  USERNAME_AVAILABILITY_STATE_UNAVAILABLE = 2;
  USERNAME_AVAILABILITY_STATE_AVAILABLE = 3;
}

message CheckUsernameAvailabilityRequest {
  string username = 1;
}

message CheckUsernameAvailabilityResponse {
  string canonical_username = 1;
  UsernameAvailabilityState state = 2;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  User user = 1;
}

message ListUsersRequest {
  // The maximum number of users to return.
  // If zero, the server defaults to 10. The server clamps values above 50 to 50.
  int32 page_size = 1;

  // A page token received from a prior ListUsersResponse.
  string page_token = 2;
}

message ListUsersResponse {
  repeated User users = 1;
  string next_page_token = 2;
}

message IntegrationOutboxEvent {
  string id = 1;
  string event_type = 2;
  string payload_json = 3;
  string dedupe_key = 4;
  string status = 5;
  int32 attempt_count = 6;
  google.protobuf.Timestamp next_attempt_at = 7;
  string lease_owner = 8;
  google.protobuf.Timestamp lease_expires_at = 9;
  string last_error = 10;
  google.protobuf.Timestamp processed_at = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

message LeaseIntegrationOutboxEventsRequest {
  string consumer = 1;
  int32 limit = 2;
  int64 lease_ttl_ms = 3;
  google.protobuf.Timestamp now = 4;
}

message LeaseIntegrationOutboxEventsResponse {
  repeated IntegrationOutboxEvent events = 1;
}

enum IntegrationOutboxAckOutcome {
  INTEGRATION_OUTBOX_ACK_OUTCOME_UNSPECIFIED = 0;
  INTEGRATION_OUTBOX_ACK_OUTCOME_SUCCEEDED = 1;
  INTEGRATION_OUTBOX_ACK_OUTCOME_RETRY = 2;
  INTEGRATION_OUTBOX_ACK_OUTCOME_DEAD = 3;
}

message AckIntegrationOutboxEventRequest {
  string event_id = 1;
  string consumer = 2;
  IntegrationOutboxAckOutcome outcome = 3;
  google.protobuf.Timestamp next_attempt_at = 4;
  string last_error = 5;
}

message AckIntegrationOutboxEventResponse {}
